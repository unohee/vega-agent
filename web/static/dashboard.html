<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VEGA</title>
<style>
:root {
  --bg:      #0d1117;
  --surface: #161b22;
  --surface2:#1c2128;
  --border:  #30363d;
  --text:    #c9d1d9;
  --muted:   #8b949e;
  --accent:  #58a6ff;
  --green:   #3fb950;
  --yellow:  #d29922;
  --red:     #f85149;
  --purple:  #bc8cff;
  --error:   #f85149;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%; background: var(--bg); color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  font-size: 15px; line-height: 1.6;
}

.page { min-height: 100vh; display: flex; flex-direction: column; padding: 0 0 40px; }

/* ── 헤더 ── */
header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 20px 32px 16px;
  border-bottom: 1px solid var(--border);
  -webkit-app-region: drag;
}
body.tauri header { padding-top: 28px; padding-left: 92px; }
header button, header button *, header a, header a *,
header input, header select { -webkit-app-region: no-drag; }
.header-left { display: flex; align-items: baseline; gap: 16px; }
.logo { font-size: 22px; font-weight: 700; letter-spacing: -.5px; color: var(--text); }
.logo span { color: var(--accent); }
.date-line { font-size: 14px; color: var(--muted); }
.header-right { display: flex; gap: 10px; align-items: center; }
.clock { font-size: 13px; color: var(--muted); font-variant-numeric: tabular-nums; }
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 14px; border-radius: 8px; border: 1px solid var(--border);
  background: var(--surface); color: var(--text); font-size: 13px;
  cursor: pointer; text-decoration: none; transition: border-color .15s, background .15s;
}
.btn:hover { border-color: var(--accent); background: var(--surface2); }
.btn.primary { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 600; }
.btn.primary:hover { opacity: .88; }
.refresh-btn { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 13px; padding: 2px 6px; border-radius: 4px; }
.refresh-btn:hover { color: var(--text); }
.spin { animation: spin .6s linear infinite; display: inline-block; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── 히어로: VEGA가 지금 기억하는 것 ── */
.hero { padding: 26px 32px 20px; }
.hero-eyebrow { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 12px; }
.hero-stats { display: flex; flex-wrap: wrap; gap: 14px; }
.stat-pill {
  display: flex; flex-direction: column; gap: 2px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 14px 20px; min-width: 120px;
  cursor: pointer; transition: border-color .15s, transform .1s;
}
.stat-pill:hover { border-color: var(--accent); transform: translateY(-1px); }
.stat-pill .sp-value { font-size: 28px; font-weight: 700; line-height: 1; font-variant-numeric: tabular-nums; }
.stat-pill .sp-label { font-size: 12px; color: var(--muted); }
.stat-pill .sp-sub { font-size: 11px; color: var(--muted); opacity: .8; }
.stat-pill.persona .sp-value { color: var(--purple); }
.stat-pill.events  .sp-value { color: var(--accent); }
.stat-pill.entities .sp-value { color: var(--green); }
.stat-pill.sessions .sp-value { color: var(--yellow); }

/* 제안 배너 */
.suggest-banner {
  margin-top: 16px;
  background: linear-gradient(90deg, rgba(188,140,255,.10), rgba(88,166,255,.06));
  border: 1px solid rgba(188,140,255,.3);
  border-radius: 12px; padding: 12px 16px;
  display: flex; align-items: center; gap: 12px;
}
.suggest-banner.hidden { display: none; }
.sb-icon { font-size: 18px; }
.sb-text { flex: 1; min-width: 0; font-size: 13px; }
.sb-text b { color: var(--text); }
.sb-toggle { font-size: 12px; color: var(--accent); cursor: pointer; white-space: nowrap; }
.suggest-list { margin-top: 10px; display: none; flex-direction: column; gap: 6px; }
.suggest-list.show { display: flex; }
.suggest-item {
  display: flex; align-items: flex-start; gap: 10px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 9px 12px;
}
.suggest-body { flex: 1; min-width: 0; }
.suggest-title { font-size: 13px; }
.suggest-reason { font-size: 11px; color: var(--muted); margin-top: 2px; }
.suggest-project { font-size: 11px; color: var(--purple); margin-top: 1px; }
.suggest-actions { display: flex; gap: 6px; flex-shrink: 0; }
.suggest-btn { font-size: 11px; padding: 3px 9px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface2); color: var(--muted); cursor: pointer; white-space: nowrap; }
.suggest-btn.accept { border-color: var(--green); color: var(--green); }
.suggest-btn.accept:hover { background: rgba(63,185,80,.15); }
.suggest-btn:disabled { opacity: .4; cursor: default; }

/* ── 탭 ── */
.tabs {
  display: flex; gap: 4px; padding: 0 32px;
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
}
.tab {
  padding: 10px 16px; font-size: 13px; font-weight: 600; color: var(--muted);
  background: none; border: none; border-bottom: 2px solid transparent;
  cursor: pointer; white-space: nowrap; transition: color .12s;
  display: inline-flex; align-items: center; gap: 6px;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--text); border-bottom-color: var(--accent); }
.tab .tab-count { font-size: 11px; color: var(--muted); background: var(--surface2); border-radius: 9px; padding: 0 6px; }

/* ── 탭 패널 ── */
.tab-panel { display: none; padding: 22px 32px 0; }
.tab-panel.active { display: block; }

/* 검색 바 */
.search-row { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.search-input {
  flex: 1; min-width: 200px;
  background: var(--surface); color: var(--text);
  border: 1px solid var(--border); border-radius: 8px;
  padding: 8px 12px; font: inherit; font-size: 13px; outline: none;
}
.search-input:focus { border-color: var(--accent); }
.filter-chip {
  font-size: 12px; padding: 6px 12px; border-radius: 8px;
  border: 1px solid var(--border); background: var(--surface); color: var(--muted);
  cursor: pointer; white-space: nowrap;
}
.filter-chip.active { border-color: var(--accent); color: var(--accent); background: var(--surface2); }

/* ── 카드 (탭 내부 그룹) ── */
.cards { display: grid; grid-template-columns: 1fr; gap: 14px; }
@media (min-width: 900px) { .cards.two { grid-template-columns: 1fr 1fr; align-items: start; } }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
.card-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 13px 18px 10px; border-bottom: 1px solid var(--border);
}
.card-title { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }
.card-count { font-size: 12px; color: var(--muted); background: var(--surface2); border-radius: 10px; padding: 1px 8px; }
.card-body { padding: 4px 0; }

/* ── 메모리 행 (편집/삭제 hover 액션) ── */
.mem-row {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 18px; border-bottom: 1px solid rgba(48,54,61,.5);
  transition: background .12s; position: relative;
}
.mem-row:last-child { border-bottom: none; }
.mem-row:hover { background: var(--surface2); }
.mem-main { flex: 1; min-width: 0; }
.mem-title { font-size: 14px; line-height: 1.45; }
.mem-meta { font-size: 11px; color: var(--muted); margin-top: 3px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.mem-kind { font-size: 10px; padding: 1px 7px; border-radius: 9px; background: var(--surface2); border: 1px solid var(--border); color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
.mem-kind.person   { color: #79c0ff; border-color: rgba(121,192,255,.35); }
.mem-kind.org      { color: #ff9d7a; border-color: rgba(255,157,122,.35); }
.mem-kind.project  { color: var(--green); border-color: rgba(63,185,80,.35); }
.mem-kind.topic    { color: var(--purple); border-color: rgba(188,140,255,.35); }
.mem-kind.decision { color: var(--yellow); border-color: rgba(210,153,34,.35); }
.mem-notes { font-size: 12px; color: var(--muted); margin-top: 4px; line-height: 1.5; }
.mem-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; }
.tag-chip { font-size: 10px; padding: 1px 6px; border-radius: 8px; background: var(--surface2); border: 1px solid var(--border); color: var(--muted); }
.mem-actions { display: flex; gap: 6px; flex-shrink: 0; opacity: 0; transition: opacity .12s; }
.mem-row:hover .mem-actions { opacity: 1; }
.mem-act-btn {
  font-size: 11px; padding: 3px 9px; border-radius: 6px;
  border: 1px solid var(--border); background: var(--surface); color: var(--muted); cursor: pointer;
}
.mem-act-btn:hover { color: var(--text); border-color: var(--accent); }
.mem-act-btn.danger:hover { color: var(--red); border-color: var(--red); }

/* 날짜 구분선 (타임라인) */
.day-header {
  padding: 8px 18px 4px; font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .06em;
  color: var(--muted); background: var(--surface2); border-bottom: 1px solid var(--border);
}

/* 인라인 편집 */
.mem-edit { width: 100%; background: rgba(0,0,0,.25); color: var(--text); border: 1px solid var(--accent); border-radius: 6px; padding: 6px 9px; font: inherit; font-size: 13px; resize: vertical; min-height: 54px; outline: none; }

/* 브리핑 / 내러티브 본문 */
.brief-body { font-size: 12.5px; line-height: 1.6; color: var(--text); white-space: pre-wrap; max-height: 220px; overflow-y: auto; padding: 2px 0; }
.brief-head { font-size: 12px; color: var(--muted); margin-bottom: 4px; }

/* 일정/메일/이슈 (오늘 탭) */
.event-time { min-width: 44px; text-align: right; font-size: 12px; color: var(--accent); font-variant-numeric: tabular-nums; padding-top: 2px; font-weight: 500; }
.dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); margin-top: 6px; flex-shrink: 0; }
.dot.lesson { background: #79c0ff; } .dot.allday { background: var(--muted); }
.issue-id { font-size: 11px; color: var(--muted); font-family: monospace; min-width: 56px; padding-top: 2px; }
.priority-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; margin-top: 7px; }
.p1{background:var(--red);} .p2{background:var(--yellow);} .p3{background:var(--accent);} .p4{background:var(--muted);} .p0{background:var(--border);}
.mail-priority { font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 6px; flex-shrink: 0; margin-top: 2px; text-transform: uppercase; }
.mail-priority.high { background: rgba(248,81,73,.15); color: var(--red); border: 1px solid rgba(248,81,73,.3); }
.mail-priority.medium { background: rgba(210,153,34,.15); color: var(--yellow); border: 1px solid rgba(210,153,34,.3); }

/* 상태 표시 */
.empty { padding: 24px 18px; text-align: center; color: var(--muted); font-size: 13px; }
.skeleton { padding: 14px 18px; display: flex; flex-direction: column; gap: 10px; }
.sk-line { height: 13px; border-radius: 4px; background: linear-gradient(90deg, var(--surface2) 25%, var(--border) 50%, var(--surface2) 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; }
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
.load-more { display: block; width: calc(100% - 36px); margin: 10px 18px 4px; padding: 8px; text-align: center; font-size: 12px; color: var(--muted); background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; cursor: pointer; }
.load-more:hover { color: var(--text); border-color: var(--accent); }

/* 커스텀 위젯 (오늘 탭 하단) */
.widget-stat { padding: 14px 18px 18px; }
.widget-stat .w-value { font-size: 32px; font-weight: 700; line-height: 1.1; }
.widget-stat .w-label { font-size: 13px; color: var(--muted); margin-top: 4px; }
.widget-text { padding: 12px 18px 16px; font-size: 13px; line-height: 1.6; white-space: pre-wrap; max-height: 240px; overflow-y: auto; }
.widget-list .w-item { padding: 8px 18px; border-bottom: 1px solid var(--border); font-size: 13px; }
.widget-list .w-item:last-child { border-bottom: none; }
.widget-list .w-item-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
.widget-err { padding: 14px 18px; font-size: 12px; color: var(--muted); }
.widget-action { padding: 12px 16px 14px; display: flex; flex-direction: column; gap: 8px; }
.widget-action .wa-row { display: flex; flex-direction: column; gap: 2px; }
.widget-action label { font-size: 11px; color: var(--muted); }
.widget-action input, .widget-action textarea { width: 100%; background: rgba(0,0,0,.2); color: var(--text); border: 1px solid var(--border); border-radius: 5px; padding: 6px 9px; font: inherit; font-size: 12px; outline: none; }
.widget-action textarea { resize: vertical; min-height: 60px; max-height: 200px; }
.widget-action input:focus, .widget-action textarea:focus { border-color: rgba(88,166,255,.6); }
.widget-action .wa-actions { display: flex; gap: 6px; justify-content: flex-end; align-items: center; }
.widget-action .wa-status { font-size: 11px; color: var(--muted); flex: 1; }
.widget-action .wa-run { padding: 5px 14px; font-size: 12px; font-weight: 600; background: rgba(56,139,253,.18); color: #79c0ff; border: 1px solid rgba(56,139,253,.35); border-radius: 5px; cursor: pointer; }
.widget-action .wa-run:hover { background: rgba(56,139,253,.28); }
.widget-action .wa-run:disabled { opacity: .5; cursor: wait; }
.widget-action .wa-result { margin-top: 4px; font-size: 12px; line-height: 1.6; background: rgba(0,0,0,.22); border: 1px solid var(--border); border-radius: 5px; padding: 8px 10px; max-height: 320px; overflow-y: auto; white-space: pre-wrap; word-break: break-word; display: none; }
.widget-action .wa-result.show { display: block; }
.widget-action .wa-result.empty { color: var(--muted); font-style: italic; }

@media (max-width: 600px) {
  header { padding: 14px 16px 12px; flex-wrap: wrap; gap: 8px; }
  .clock { display: none; }
  .hero { padding: 18px 16px 14px; }
  .tabs, .tab-panel { padding-left: 16px; padding-right: 16px; }
  .stat-pill { padding: 12px 16px; min-width: 90px; }
  .stat-pill .sp-value { font-size: 22px; }
}
</style>
</head>
<body>
<div class="page">
  <header>
    <div class="header-left">
      <div class="logo">VE<span>GA</span></div>
      <div class="date-line" id="date-line">—</div>
    </div>
    <div class="header-right">
      <span class="clock" id="clock">—</span>
      <button class="btn" id="refresh-btn" onclick="refreshAll()"><span id="refresh-icon">↻</span> 새로고침</button>
      <a class="btn primary" href="/chat">💬 대화하기</a>
    </div>
  </header>

  <!-- 히어로: VEGA가 지금 기억하는 것 -->
  <section class="hero">
    <div class="hero-eyebrow">VEGA가 지금 기억하는 것</div>
    <div class="hero-stats" id="hero-stats">
      <div class="stat-pill persona"  data-tab="persona"><div class="sp-value" id="st-persona">—</div><div class="sp-label">페르소나</div><div class="sp-sub" id="st-persona-sub">&nbsp;</div></div>
      <div class="stat-pill entities" data-tab="entities"><div class="sp-value" id="st-entities">—</div><div class="sp-label">인물·엔티티</div><div class="sp-sub" id="st-entities-sub">&nbsp;</div></div>
      <div class="stat-pill events"   data-tab="timeline"><div class="sp-value" id="st-events">—</div><div class="sp-label">이벤트</div><div class="sp-sub">타임라인</div></div>
      <div class="stat-pill sessions" data-tab="recent"><div class="sp-value" id="st-sessions">—</div><div class="sp-label">대화 메모리</div><div class="sp-sub" id="st-rules-sub">&nbsp;</div></div>
    </div>

    <div class="suggest-banner hidden" id="suggest-banner">
      <span class="sb-icon">💡</span>
      <div class="sb-text" id="sb-text">VEGA 제안을 불러오는 중…</div>
      <span class="sb-toggle" id="sb-toggle" style="display:none">펼치기 ›</span>
    </div>
    <div class="suggest-list" id="suggest-list"></div>
  </section>

  <!-- 탭 -->
  <nav class="tabs" id="tabs">
    <button class="tab active" data-tab="recent">🧠 최근 기억</button>
    <button class="tab" data-tab="entities">👤 인물·엔티티 <span class="tab-count" id="tc-entities"></span></button>
    <button class="tab" data-tab="timeline">📅 타임라인 <span class="tab-count" id="tc-timeline"></span></button>
    <button class="tab" data-tab="persona">🎭 페르소나 <span class="tab-count" id="tc-persona"></span></button>
    <button class="tab" data-tab="rules">⚖️ 규칙·스킬</button>
    <button class="tab" data-tab="today">☀️ 오늘</button>
  </nav>

  <!-- 최근 기억 -->
  <section class="tab-panel active" data-tab="recent">
    <div class="cards two">
      <div class="card">
        <div class="card-header"><div class="card-title"><span>🧠</span> 최근 대화 메모리</div><span class="card-count" id="recent-count">—</span></div>
        <div class="card-body" id="recent-body"><div class="skeleton"><div class="sk-line" style="width:90%"></div><div class="sk-line" style="width:80%"></div></div></div>
      </div>
      <div class="card">
        <div class="card-header"><div class="card-title"><span>📋</span> 최근 브리핑</div><span class="card-count" id="briefs-count">—</span></div>
        <div class="card-body" id="briefs-body"><div class="empty">아직 생성된 브리핑이 없습니다</div></div>
      </div>
    </div>
  </section>

  <!-- 인물·엔티티 -->
  <section class="tab-panel" data-tab="entities">
    <div class="search-row">
      <input class="search-input" id="ent-search" placeholder="인물·조직·프로젝트 검색…">
      <button class="filter-chip active" data-kind="">전체</button>
      <button class="filter-chip" data-kind="person">인물</button>
      <button class="filter-chip" data-kind="org">조직</button>
      <button class="filter-chip" data-kind="project">프로젝트</button>
      <button class="filter-chip" data-kind="topic">주제</button>
      <button class="filter-chip" data-kind="decision">결정</button>
    </div>
    <div class="card"><div class="card-body" id="entities-body"><div class="skeleton"><div class="sk-line" style="width:85%"></div><div class="sk-line" style="width:70%"></div></div></div></div>
  </section>

  <!-- 타임라인 -->
  <section class="tab-panel" data-tab="timeline">
    <div class="search-row">
      <input class="search-input" id="ev-search" placeholder="이벤트 검색…">
      <button class="filter-chip active" data-tag="">전체</button>
      <button class="filter-chip" data-tag="family">가족</button>
      <button class="filter-chip" data-tag="trading">트레이딩</button>
      <button class="filter-chip" data-tag="research">연구</button>
      <button class="filter-chip" data-tag="business">사업</button>
      <button class="filter-chip" data-tag="ai_infra">AI인프라</button>
    </div>
    <div class="card"><div class="card-body" id="timeline-body"><div class="skeleton"><div class="sk-line" style="width:80%"></div><div class="sk-line" style="width:65%"></div></div></div></div>
  </section>

  <!-- 페르소나 -->
  <section class="tab-panel" data-tab="persona">
    <div class="search-row">
      <input class="search-input" id="pers-search" placeholder="페르소나 섹션 검색…">
      <button class="filter-chip active" id="pers-active-chip">활성만</button>
    </div>
    <div class="card"><div class="card-body" id="persona-body"><div class="skeleton"><div class="sk-line" style="width:90%"></div><div class="sk-line" style="width:75%"></div></div></div></div>
  </section>

  <!-- 규칙·스킬 -->
  <section class="tab-panel" data-tab="rules">
    <div class="cards two">
      <div class="card">
        <div class="card-header"><div class="card-title"><span>⚖️</span> 행동 규칙</div><span class="card-count" id="rules-count">—</span></div>
        <div class="card-body" id="rules-body"><div class="empty">불러오는 중…</div></div>
      </div>
      <div class="card">
        <div class="card-header"><div class="card-title"><span>🧩</span> 스킬 (슬래시 커맨드)</div><span class="card-count" id="skills-count">—</span></div>
        <div class="card-body" id="skills-body"><div class="empty">불러오는 중…</div></div>
      </div>
    </div>
  </section>

  <!-- 오늘 (일정/메일/이슈 + 커스텀 위젯) -->
  <section class="tab-panel" data-tab="today">
    <div class="cards two" id="today-grid">
      <div class="card">
        <div class="card-header"><div class="card-title"><span>📅</span> 이번주 일정</div><span class="card-count" id="event-count">—</span></div>
        <div class="card-body" id="events-body"><div class="skeleton"><div class="sk-line" style="width:80%"></div><div class="sk-line" style="width:65%"></div></div></div>
      </div>
      <div class="card">
        <div class="card-header"><div class="card-title"><span>📬</span> 중요 메일</div><span class="card-count" id="mail-count">—</span></div>
        <div class="card-body" id="mails-body"><div class="empty">중요 메일 없음</div></div>
      </div>
      <div class="card">
        <div class="card-header"><div class="card-title"><span>⚡</span> 진행 중 이슈</div><span class="card-count" id="issue-count">—</span></div>
        <div class="card-body" id="issues-body"><div class="skeleton"><div class="sk-line" style="width:70%"></div><div class="sk-line" style="width:55%"></div></div></div>
      </div>
      <div class="card">
        <div class="card-header"><div class="card-title"><span>🗂️</span> 프로젝트 상태</div><span class="card-count" id="projects-count">—</span></div>
        <div class="card-body" id="projects-body"><div class="empty">프로젝트 상태 없음</div></div>
      </div>
      <!-- 커스텀 위젯이 여기에 append -->
    </div>
  </section>
</div>

<script>
// ── 공통 ──
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function _debounce(fn, ms) {
  let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); };
}

// ── Tauri: 신호등 공간 + 헤더 드래그 ──
(function () {
  function detectTauri() {
    const t = !!(window.__TAURI__ || window.__TAURI_INTERNALS__ || window.isTauri);
    if (t) document.body.classList.add('tauri');
    return t;
  }
  detectTauri();
  setTimeout(detectTauri, 50);
  window.addEventListener('DOMContentLoaded', () => {
    detectTauri();
    const hdr = document.querySelector('header');
    if (!hdr) return;
    hdr.addEventListener('mousedown', (e) => {
      if (e.button !== 0) return;
      if (e.target.closest('button, a, input, textarea, select')) return;
      const t = window.__TAURI__;
      const inv = t?.core?.invoke || t?.invoke;
      if (inv) {
        inv('plugin:window|start_dragging').catch(() => {
          if (t?.window?.getCurrentWindow) {
            try { t.window.getCurrentWindow().startDragging(); } catch {}
          }
        });
      }
    });
  });
})();

// ── 시계 ──
function tickClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleTimeString('ko-KR', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
}
setInterval(tickClock, 1000); tickClock();

// ── 탭 전환 ──
const _loadedTabs = new Set();
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.dataset.tab === name));
  // 탭 최초 진입 시 lazy 로드
  if (!_loadedTabs.has(name)) {
    _loadedTabs.add(name);
    if (name === 'entities') loadEntities();
    else if (name === 'timeline') loadTimeline();
    else if (name === 'persona') loadPersona();
    else if (name === 'rules') { loadRules(); loadSkills(); }
    else if (name === 'today') loadToday();
  }
}
document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => switchTab(t.dataset.tab)));
// 히어로 통계 클릭 → 해당 탭으로
document.querySelectorAll('.stat-pill').forEach(p => p.addEventListener('click', () => switchTab(p.dataset.tab)));

// ── 히어로: 메모리 요약 ──
async function loadSummary() {
  try {
    const d = await (await fetch('/api/memory/summary')).json();
    document.getElementById('st-persona').textContent = d.persona?.total ?? '—';
    document.getElementById('st-persona-sub').textContent = `활성 ${d.persona?.active ?? 0}`;
    document.getElementById('st-events').textContent = d.events?.total ?? '—';
    document.getElementById('st-entities').textContent = d.entities?.total ?? '—';
    const kinds = (d.entities?.by_kind || []).slice(0, 2).map(k => `${esc(k.kind)} ${k.cnt}`).join(' · ');
    document.getElementById('st-entities-sub').textContent = kinds || ' ';
    document.getElementById('st-sessions').textContent = d.sessions?.total ?? '—';
    document.getElementById('tc-persona').textContent = d.persona?.total ?? '';
    document.getElementById('tc-entities').textContent = d.entities?.total ?? '';
    document.getElementById('tc-timeline').textContent = d.events?.total ?? '';
  } catch (e) { console.warn('summary 실패', e); }
}

// ── 최근 기억 (narrative) ──
async function loadRecent() {
  try {
    const d = await (await fetch('/api/memory/recent')).json();
    const memories = d.memories || [];
    document.getElementById('recent-count').textContent = memories.length || '0';
    const el = document.getElementById('recent-body');
    if (!memories.length) { el.innerHTML = '<div class="empty">아직 기록된 대화 메모리가 없습니다</div>'; return; }
    el.innerHTML = memories.map(m => {
      const dt = new Date(m.updated_at || m.ingested_at);
      const dateStr = isNaN(dt) ? '' : `${dt.getMonth()+1}/${dt.getDate()}`;
      const narrative = m.narrative || m.title || '';
      return `<div class="mem-row"><div class="mem-main">
        <div class="mem-title">${esc(narrative)}</div>
        <div class="mem-meta"><span>${esc(m.title || '')}</span>${dateStr ? `<span>· ${dateStr}</span>` : ''}</div>
      </div></div>`;
    }).join('');
  } catch (e) {
    document.getElementById('recent-body').innerHTML = '<div class="empty">메모리 로드 실패</div>';
  }
}

// ── 최근 브리핑 ──
async function loadBriefs() {
  try {
    const d = await (await fetch('/api/briefs/recent')).json();
    const briefs = d.briefs || [];
    document.getElementById('briefs-count').textContent = briefs.length || '0';
    const el = document.getElementById('briefs-body');
    if (!briefs.length) { el.innerHTML = '<div class="empty">아직 생성된 브리핑이 없습니다</div>'; return; }
    el.innerHTML = briefs.map(b => {
      const kindLabel = b.kind === 'morning' ? '🌅 아침 브리핑' : '🌆 저녁 리뷰';
      return `<div class="mem-row"><div class="mem-main">
        <div class="brief-head">${kindLabel} — ${esc(b.date)}</div>
        <div class="brief-body">${esc(b.body_md || '')}</div>
      </div></div>`;
    }).join('');
  } catch (e) {
    document.getElementById('briefs-body').innerHTML = '<div class="empty">브리핑 로드 실패</div>';
  }
}

// ── 인물·엔티티 ──
let _entKind = '', _entSearch = '';
async function loadEntities() {
  const el = document.getElementById('entities-body');
  try {
    const q = new URLSearchParams({ limit: '60' });
    if (_entKind) q.set('kind', _entKind);
    if (_entSearch) q.set('search', _entSearch);
    const d = await (await fetch('/api/memory/entities?' + q)).json();
    const rows = d.rows || [];
    if (!rows.length) { el.innerHTML = '<div class="empty">일치하는 엔티티 없음</div>'; return; }
    el.innerHTML = rows.map(r => {
      let aliases = [];
      try { aliases = JSON.parse(r.aliases_json || '[]'); } catch {}
      const aliasStr = aliases.length ? ` · ${aliases.slice(0,3).map(esc).join(', ')}` : '';
      return `<div class="mem-row" data-id="${r.id}">
        <div class="mem-main">
          <div class="mem-title">${esc(r.name)}</div>
          <div class="mem-meta"><span class="mem-kind ${esc(r.kind)}">${esc(r.kind)}</span><span>${esc((r.last_seen||'').slice(0,10))}${aliasStr}</span></div>
          ${r.notes ? `<div class="mem-notes">${esc(r.notes)}</div>` : ''}
        </div>
        <div class="mem-actions">
          <button class="mem-act-btn danger" onclick="deleteEntity(${r.id}, this)">삭제</button>
        </div>
      </div>`;
    }).join('');
  } catch (e) { el.innerHTML = '<div class="empty">엔티티 로드 실패</div>'; }
}
async function deleteEntity(id, btn) {
  if (!confirm('이 엔티티를 삭제할까요? (재적재 가능)')) return;
  btn.disabled = true;
  try {
    const r = await fetch(`/api/memory/entities/${id}`, { method: 'DELETE' });
    if (r.ok) { const row = btn.closest('.mem-row'); row.style.opacity = '.3'; row.style.pointerEvents = 'none'; loadSummary(); }
    else btn.disabled = false;
  } catch { btn.disabled = false; }
}

// ── 타임라인 (events) ──
let _evTag = '', _evSearch = '', _evOffset = 0;
async function loadTimeline(append) {
  const el = document.getElementById('timeline-body');
  if (!append) _evOffset = 0;
  try {
    const q = new URLSearchParams({ limit: '50', offset: String(_evOffset) });
    if (_evTag) q.set('tag', _evTag);
    if (_evSearch) q.set('search', _evSearch);
    const d = await (await fetch('/api/memory/events?' + q)).json();
    const rows = d.rows || [];
    const html = rows.map(r => {
      const tags = (r.tags || '').split(',').map(t => t.trim()).filter(Boolean);
      const tagChips = tags.map(t => `<span class="tag-chip">${esc(t)}</span>`).join('');
      return `<div class="mem-row" data-id="${r.id}">
        <div class="mem-main">
          <div class="mem-title">${esc(r.title)}</div>
          <div class="mem-meta"><span>${esc((r.event_date||'').slice(0,10))}</span>${r.era ? `<span>· ${esc(r.era)}</span>` : ''}</div>
          ${r.body ? `<div class="mem-notes">${esc(r.body)}</div>` : ''}
          ${tagChips ? `<div class="mem-tags">${tagChips}</div>` : ''}
        </div>
        <div class="mem-actions"><button class="mem-act-btn danger" onclick="deleteEvent(${r.id}, this)">삭제</button></div>
      </div>`;
    }).join('');
    if (!append) {
      el.innerHTML = rows.length ? html : '<div class="empty">일치하는 이벤트 없음</div>';
    } else {
      el.querySelector('.load-more')?.remove();
      el.insertAdjacentHTML('beforeend', html);
    }
    _evOffset += rows.length;
    if (rows.length >= 50 && _evOffset < (d.total || 0)) {
      el.insertAdjacentHTML('beforeend', `<button class="load-more" onclick="loadTimeline(true)">더 보기 (${_evOffset}/${d.total})</button>`);
    }
  } catch (e) { el.innerHTML = '<div class="empty">타임라인 로드 실패</div>'; }
}
async function deleteEvent(id, btn) {
  if (!confirm('이 이벤트를 삭제할까요? (재적재 가능)')) return;
  btn.disabled = true;
  try {
    const r = await fetch(`/api/memory/events/${id}`, { method: 'DELETE' });
    if (r.ok) { const row = btn.closest('.mem-row'); row.style.opacity = '.3'; row.style.pointerEvents = 'none'; loadSummary(); }
    else btn.disabled = false;
  } catch { btn.disabled = false; }
}

// ── 페르소나 ──
let _persActive = true, _persSearch = '';
async function loadPersona() {
  const el = document.getElementById('persona-body');
  try {
    const q = new URLSearchParams();
    if (_persActive) q.set('active_only', 'true');
    if (_persSearch) q.set('search', _persSearch);
    const d = await (await fetch('/api/memory/persona?' + q)).json();
    const rows = d.rows || [];
    if (!rows.length) { el.innerHTML = '<div class="empty">페르소나 섹션 없음</div>'; return; }
    el.innerHTML = rows.map(r => `
      <div class="mem-row" data-id="${r.id}">
        <div class="mem-main">
          <div class="mem-meta"><span class="mem-kind">${esc(r.section_key || r.scope || '')}</span>${r.user_edited ? '<span>✏️ 사용자 편집</span>' : ''}${!r.is_active ? '<span>· 비활성</span>' : ''}</div>
          <div class="mem-notes" id="pers-content-${r.id}">${esc(r.content || '')}</div>
        </div>
        <div class="mem-actions"><button class="mem-act-btn" onclick="editPersona(${r.id}, this)">편집</button></div>
      </div>`).join('');
  } catch (e) { el.innerHTML = '<div class="empty">페르소나 로드 실패</div>'; }
}
function editPersona(id, btn) {
  const contentEl = document.getElementById(`pers-content-${id}`);
  const cur = contentEl.textContent;
  const ta = document.createElement('textarea');
  ta.className = 'mem-edit'; ta.value = cur;
  contentEl.replaceWith(ta); ta.focus();
  btn.textContent = '저장';
  btn.onclick = async () => {
    btn.disabled = true;
    try {
      const r = await fetch(`/api/memory/persona/${id}`, {
        method: 'PATCH', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ content: ta.value }),
      });
      if (r.ok) loadPersona();
      else btn.disabled = false;
    } catch { btn.disabled = false; }
  };
}

// ── 규칙 ──
async function loadRules() {
  const el = document.getElementById('rules-body');
  try {
    const d = await (await fetch('/api/memory/rules')).json();
    const rules = d.rules || [];
    document.getElementById('rules-count').textContent = rules.length || '0';
    if (!rules.length) { el.innerHTML = '<div class="empty">저장된 행동 규칙 없음</div>'; return; }
    el.innerHTML = rules.map(r => `<div class="mem-row"><div class="mem-main">
      <div class="mem-title">${esc(r.rule_text)}</div>
      <div class="mem-meta"><span class="mem-kind">${esc(r.section)}</span><span>${esc(r.rule_id)}</span></div>
    </div></div>`).join('');
  } catch (e) { el.innerHTML = '<div class="empty">규칙 로드 실패</div>'; }
}
async function loadSkills() {
  const el = document.getElementById('skills-body');
  try {
    const d = await (await fetch('/api/commands')).json();
    const custom = (d.commands || []).filter(c => c.custom);
    document.getElementById('skills-count').textContent = custom.length || '0';
    if (!custom.length) { el.innerHTML = '<div class="empty">커스텀 스킬 없음 — 채팅에서 /skill로 생성</div>'; return; }
    el.innerHTML = custom.map(c => `<div class="mem-row"><div class="mem-main">
      <div class="mem-title">/${esc(c.name)}</div>
      ${c.desc ? `<div class="mem-notes">${esc(c.desc)}</div>` : ''}
    </div></div>`).join('');
  } catch (e) { el.innerHTML = '<div class="empty">스킬 로드 실패</div>'; }
}

// ── VEGA 제안 (히어로 배너) ──
async function loadSuggestions() {
  const banner = document.getElementById('suggest-banner');
  const text = document.getElementById('sb-text');
  const toggle = document.getElementById('sb-toggle');
  const list = document.getElementById('suggest-list');
  try {
    const d = await (await fetch('/api/todos/suggest')).json();
    const sugg = d.suggestions || [];
    banner.classList.remove('hidden');
    if (!sugg.length) { text.innerHTML = 'VEGA 제안 없음 — gemma 분석 대기 중'; return; }
    text.innerHTML = `<b>VEGA 제안 ${sugg.length}건</b> — ${esc(sugg[0].title)}`;
    toggle.style.display = '';
    list.innerHTML = sugg.map((s, i) => `
      <div class="suggest-item" id="suggest-${i}">
        <div class="suggest-body">
          <div class="suggest-title">${esc(s.title)}</div>
          ${s.reason ? `<div class="suggest-reason">${esc(s.reason)}</div>` : ''}
          ${s.project ? `<div class="suggest-project">${esc(s.project)}</div>` : ''}
        </div>
        <div class="suggest-actions">
          <button class="suggest-btn accept" onclick="acceptSuggest(${i}, ${JSON.stringify(s.title).replace(/"/g,'&quot;')}, ${JSON.stringify(s.project||'').replace(/"/g,'&quot;')}, this)">✓ 수락</button>
        </div>
      </div>`).join('');
    let open = false;
    toggle.onclick = () => { open = !open; list.classList.toggle('show', open); toggle.textContent = open ? '접기 ›' : '펼치기 ›'; };
  } catch (e) {
    banner.classList.remove('hidden');
    text.innerHTML = 'VEGA 제안 로드 실패';
  }
}
async function acceptSuggest(idx, title, project, btn) {
  btn.disabled = true;
  const orig = btn.textContent;
  btn.textContent = '추가 중…';
  try {
    const res = await fetch('/api/todos/suggest/accept', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ title, project }),
    });
    // HTTP 에러(4xx/5xx) 또는 본문 ok:false면 실패로 처리 — 성공 표시는 ok일 때만 (INT-1473)
    const d = await res.json().catch(() => ({}));
    if (!res.ok || d.ok === false) throw new Error(d.error || `HTTP ${res.status}`);
    btn.textContent = '✓ 추가됨';
    document.getElementById(`suggest-${idx}`).style.opacity = '.4';
  } catch (e) {
    btn.textContent = '✗ 실패 — 재시도';
    btn.title = String(e.message || e);
    btn.disabled = false;
    setTimeout(() => { btn.textContent = orig; }, 3000);
  }
}

// ── 오늘 탭 (일정/메일/이슈/프로젝트 + 커스텀 위젯) ──
async function loadToday() {
  // 일정 + 이슈 (한 API)
  try {
    const d = await (await fetch('/api/dashboard')).json();
    renderEvents(d.events || []);
    renderIssues(d.issues || []);
  } catch (e) { console.warn('dashboard 실패', e); }
  // 중요 메일
  try {
    const d = await (await fetch('/api/emails/priority')).json();
    renderMails(d.emails || []);
  } catch { document.getElementById('mails-body').innerHTML = '<div class="empty">메일 로드 실패</div>'; }
  // 프로젝트
  try {
    const d = await (await fetch('/api/projects/state')).json();
    renderProjects(d.projects || []);
  } catch { document.getElementById('projects-body').innerHTML = '<div class="empty">프로젝트 로드 실패</div>'; }
  // 커스텀 위젯
  loadWidgets();
}
function renderEvents(events) {
  const el = document.getElementById('events-body');
  document.getElementById('event-count').textContent = events.length + '개';
  if (!events.length) { el.innerHTML = '<div class="empty">이번주 일정 없음</div>'; return; }
  const groups = {};
  for (const e of events) { (groups[e.date || ''] ??= []).push(e); }
  const html = [];
  for (const date of Object.keys(groups).sort()) {
    const first = groups[date][0];
    const [, mm, dd] = date.split('-');
    html.push(`<div class="day-header">${esc(`${mm}/${dd} (${first.day})`)}${first.is_today ? ' · 오늘' : ''}</div>`);
    for (const e of groups[date]) {
      const isLesson = (e.title||'').includes('레슨') || (e.title||'').includes('수업');
      const isAllDay = e.start === '종일';
      const dotClass = isAllDay ? 'allday' : isLesson ? 'lesson' : '';
      const timeLabel = isAllDay ? '종일' : (e.end ? `${e.start}–${e.end}` : e.start);
      html.push(`<div class="mem-row"><div class="event-time">${esc(timeLabel)}</div><div class="dot ${dotClass}"></div>
        <div class="mem-main"><div class="mem-title">${esc(e.title)}</div>${e.location ? `<div class="mem-meta">${esc(e.location)}</div>` : ''}</div></div>`);
    }
  }
  el.innerHTML = html.join('');
}
function renderIssues(issues) {
  const el = document.getElementById('issues-body');
  document.getElementById('issue-count').textContent = issues.length + '개';
  if (!issues.length) { el.innerHTML = '<div class="empty">진행 중인 이슈 없음</div>'; return; }
  const P = {0:'p0',1:'p1',2:'p2',3:'p3',4:'p4'};
  el.innerHTML = issues.map(i => `<div class="mem-row">
    <div class="priority-dot ${P[i.priority] || 'p0'}"></div>
    <div class="issue-id">${esc(i.identifier)}</div>
    <div class="mem-main"><div class="mem-title">${esc(i.title)}</div>${(i.project||i.team) ? `<div class="mem-meta">${esc(i.project||i.team)}</div>` : ''}</div>
  </div>`).join('');
}
function renderMails(emails) {
  const el = document.getElementById('mails-body');
  document.getElementById('mail-count').textContent = emails.length + '개';
  if (!emails.length) { el.innerHTML = '<div class="empty">중요 메일 없음</div>'; return; }
  el.innerHTML = emails.map(m => {
    const from = (m.sender || m.from || '').replace(/<.*?>/, '').trim();
    return `<div class="mem-row">
      <span class="mail-priority ${m.priority}">${m.priority === 'high' ? '긴급' : '중요'}</span>
      <div class="mem-main"><div class="mem-title">${esc(m.subject)}</div><div class="mem-meta">${esc(from)}</div>${m.reason ? `<div class="mem-notes">${esc(m.reason)}</div>` : ''}</div>
    </div>`;
  }).join('');
}
function renderProjects(projects) {
  const el = document.getElementById('projects-body');
  const meaningful = projects.filter(p => p.positioning || (p.metrics && Object.keys(p.metrics).length) || (p.next_actions && p.next_actions.length));
  document.getElementById('projects-count').textContent = projects.length || '0';
  if (!meaningful.length) { el.innerHTML = '<div class="empty">프로젝트 상태 미입력 — 채팅에서 갱신 요청</div>'; return; }
  el.innerHTML = meaningful.map(p => {
    let lines = '';
    if (p.positioning) lines += `<div class="mem-meta">${esc(p.positioning)}</div>`;
    if (p.next_actions && p.next_actions.length) lines += `<div class="mem-meta">→ ${esc(p.next_actions[0])}</div>`;
    return `<div class="mem-row"><div class="mem-main"><div class="mem-title">${esc(p.name)} <span style="color:var(--muted);font-size:12px">${esc(p.status||'')}</span></div>${lines}</div></div>`;
  }).join('');
}

// ── 커스텀 위젯 엔진 (오늘 탭 하단) ──
async function loadWidgets() {
  const grid = document.getElementById('today-grid');
  let widgets = [];
  try { widgets = (await (await fetch('/api/widgets')).json()).widgets || []; } catch { return; }
  grid.querySelectorAll('.custom-widget').forEach(el => el.remove());
  for (const w of widgets) {
    const card = document.createElement('div');
    card.className = 'card custom-widget';
    card.innerHTML = `<div class="card-header"><div class="card-title"><span>${esc(w.icon || '🧩')}</span> ${esc(w.title || '위젯')}</div></div><div class="card-body"><div class="widget-err">불러오는 중…</div></div>`;
    grid.appendChild(card);
    renderWidget(card.querySelector('.card-body'), w);
  }
}
async function renderWidget(body, w) {
  let data = {};
  if (w.source) {
    try {
      data = await (await fetch(`/api/widgets/data/${encodeURIComponent(w.source)}`)).json();
      if (data.error) { body.innerHTML = `<div class="widget-err">${esc(data.error)}</div>`; return; }
    } catch { body.innerHTML = '<div class="widget-err">데이터 로드 실패</div>'; return; }
  }
  if (w.type === 'stat') {
    body.innerHTML = `<div class="widget-stat"><div class="w-value">${esc(data.value ?? w.value ?? '—')}</div><div class="w-label">${esc(data.label ?? w.label ?? '')}</div></div>`;
  } else if (w.type === 'list') {
    const items = data.items || w.items || [];
    body.innerHTML = items.length
      ? '<div class="widget-list">' + items.map(it => `<div class="w-item">${esc(it.title || '')}${it.sub ? `<div class="w-item-sub">${esc(it.sub)}</div>` : ''}</div>`).join('') + '</div>'
      : '<div class="widget-err">항목 없음</div>';
  } else if (w.type === 'text') {
    body.innerHTML = `<div class="widget-text">${esc(data.text ?? w.text ?? '')}</div>`;
  } else if (w.type === 'action') {
    renderActionWidget(body, w);
  } else {
    body.innerHTML = `<div class="widget-err">알 수 없는 위젯 타입: ${esc(w.type)}</div>`;
  }
}
function renderActionWidget(body, w) {
  const inputs = Array.isArray(w.inputs) ? w.inputs : [];
  const rowsHtml = inputs.map(inp => {
    const id = `wa_${w.id}_${inp.name}`;
    const tag = inp.type === 'textarea'
      ? `<textarea id="${id}" name="${esc(inp.name)}" placeholder="${esc(inp.placeholder || '')}"${inp.required === false ? '' : ' required'}></textarea>`
      : `<input id="${id}" name="${esc(inp.name)}" type="${esc(inp.type === 'number' ? 'number' : (inp.type === 'url' ? 'url' : 'text'))}" placeholder="${esc(inp.placeholder || '')}"${inp.required === false ? '' : ' required'}>`;
    return `<div class="wa-row"><label for="${id}">${esc(inp.label || inp.name)}</label>${tag}</div>`;
  }).join('');
  body.innerHTML = `<div class="widget-action"><div class="wa-form">${rowsHtml}</div><div class="wa-actions"><span class="wa-status"></span><button class="wa-run" type="button">▶ 실행</button></div><div class="wa-result"></div></div>`;
  body.querySelector('.wa-run').addEventListener('click', () => runActionWidget(body, w));
  if (inputs.length === 1 && inputs[0].type !== 'textarea') {
    body.querySelector('input')?.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); runActionWidget(body, w); } });
  }
}
async function runActionWidget(body, w) {
  const btn = body.querySelector('.wa-run');
  const status = body.querySelector('.wa-status');
  const result = body.querySelector('.wa-result');
  const values = {};
  for (const inp of (w.inputs || [])) {
    const el = body.querySelector(`[name="${inp.name}"]`);
    if (!el) continue;
    const v = (el.value || '').trim();
    if ((inp.required !== false) && !v) { status.textContent = `✗ ${inp.label || inp.name} 필요`; status.style.color = 'var(--error)'; el.focus(); return; }
    values[inp.name] = v;
  }
  btn.disabled = true; btn.textContent = '⏳ 실행 중'; status.textContent = ''; status.style.color = '';
  result.classList.remove('empty'); result.classList.add('show'); result.textContent = '';
  let received = '', toolN = 0;
  try {
    const resp = await fetch('/api/widgets/run', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ widget_id: w.id, inputs: values }) });
    if (!resp.ok) { const err = await resp.json().catch(() => ({error:'HTTP '+resp.status})); result.textContent = '✗ ' + (err.error || ('HTTP '+resp.status)); result.classList.add('empty'); return; }
    const reader = resp.body.getReader(); const decoder = new TextDecoder(); let rawBuf = '';
    while (true) {
      const { done, value } = await reader.read(); if (done) break;
      rawBuf += decoder.decode(value, { stream: true });
      let idx;
      while ((idx = rawBuf.indexOf('\n\n')) >= 0) {
        const chunk = rawBuf.slice(0, idx); rawBuf = rawBuf.slice(idx + 2);
        if (!chunk.trim()) continue;
        let event = 'message', dataStr = '';
        for (const line of chunk.split('\n')) { if (line.startsWith('event: ')) event = line.slice(7).trim(); else if (line.startsWith('data: ')) dataStr = line.slice(6); }
        let payload; try { payload = JSON.parse(dataStr); } catch { continue; }
        if (event === 'token') { received += payload.token || ''; result.textContent = received; result.scrollTop = result.scrollHeight; }
        else if (event === 'tool_start') { toolN++; status.textContent = `🔧 ${toolN}개 도구 호출 중…`; }
        else if (event === 'thinking') { status.textContent = '🤔 생각 중…'; }
        else if (event === 'done') { status.textContent = '✓ 완료'; status.style.color = '#7ee787'; if (!received) { result.textContent = '(응답 비어있음)'; result.classList.add('empty'); } }
        else if (event === 'error') { status.textContent = '✗ 실패'; status.style.color = 'var(--error)'; result.textContent = '✗ ' + (payload.message || '실행 실패'); result.classList.add('empty'); }
      }
    }
  } catch (e) {
    status.textContent = '✗ 네트워크 오류'; status.style.color = 'var(--error)'; result.textContent = '✗ ' + (e.message || e); result.classList.add('empty');
  } finally { btn.disabled = false; btn.textContent = '▶ 실행'; }
}

// ── 검색·필터 바인딩 ──
document.getElementById('ent-search').addEventListener('input', _debounce(e => { _entSearch = e.target.value.trim(); loadEntities(); }, 300));
document.querySelectorAll('[data-tab="entities"] .filter-chip').forEach(c => c.addEventListener('click', () => {
  document.querySelectorAll('[data-tab="entities"] .filter-chip').forEach(x => x.classList.remove('active'));
  c.classList.add('active'); _entKind = c.dataset.kind; loadEntities();
}));
document.getElementById('ev-search').addEventListener('input', _debounce(e => { _evSearch = e.target.value.trim(); loadTimeline(); }, 300));
document.querySelectorAll('[data-tab="timeline"] .filter-chip').forEach(c => c.addEventListener('click', () => {
  document.querySelectorAll('[data-tab="timeline"] .filter-chip').forEach(x => x.classList.remove('active'));
  c.classList.add('active'); _evTag = c.dataset.tag; loadTimeline();
}));
document.getElementById('pers-search').addEventListener('input', _debounce(e => { _persSearch = e.target.value.trim(); loadPersona(); }, 300));
document.getElementById('pers-active-chip').addEventListener('click', e => {
  _persActive = !_persActive; e.target.classList.toggle('active', _persActive);
  e.target.textContent = _persActive ? '활성만' : '전체'; loadPersona();
});

// ── 초기 로드 ──
function refreshAll() {
  const icon = document.getElementById('refresh-icon');
  icon.className = 'spin';
  Promise.allSettled([loadSummary(), loadRecent(), loadBriefs(), loadSuggestions()])
    .finally(() => { icon.className = ''; });
  // 현재 활성 탭이 lazy 탭이면 다시 로드
  const active = document.querySelector('.tab.active')?.dataset.tab;
  if (active === 'entities') loadEntities();
  else if (active === 'timeline') loadTimeline();
  else if (active === 'persona') loadPersona();
  else if (active === 'rules') { loadRules(); loadSkills(); }
  else if (active === 'today') loadToday();
}
refreshAll();

// 주기 갱신 — 히어로·최근 기억만 (가벼움)
setInterval(() => { loadSummary(); loadRecent(); }, 3 * 60 * 1000);

// 포커스 시 최신화 (20초 디바운스)
let _lastRefresh = Date.now();
function refreshIfStale() {
  if (document.visibilityState !== 'visible') return;
  if (Date.now() - _lastRefresh < 20000) return;
  _lastRefresh = Date.now();
  loadSummary(); loadRecent();
}
document.addEventListener('visibilitychange', refreshIfStale);
window.addEventListener('focus', refreshIfStale);
</script>
