<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VEGA 설치 마법사</title>
<style>
  :root { --bg:#0d1117; --panel:#161b22; --border:#30363d; --fg:#e6edf3; --muted:#8b949e;
          --accent:#58a6ff; --accent2:#1f6feb; --ok:#3fb950; --err:#f85149; }
  * { box-sizing: border-box; }
  html, body { margin:0; height:100%; background:var(--bg); color:var(--fg);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
  .app { max-width:640px; margin:0 auto; min-height:100%; display:flex; flex-direction:column; padding:32px 24px; }
  .brand { font-size:22px; font-weight:700; letter-spacing:.5px; }
  .brand span { color:var(--accent); }
  .steps { display:flex; gap:8px; margin:20px 0 24px; }
  .dot { flex:1; height:4px; border-radius:2px; background:var(--border); transition:.3s; }
  .dot.active { background:var(--accent); }
  .dot.done { background:var(--ok); }
  .card { background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:24px; flex:1; display:flex; flex-direction:column; }
  h2 { margin:0 0 6px; font-size:18px; }
  .sub { color:var(--muted); font-size:13px; margin-bottom:18px; line-height:1.5; }
  label { display:block; font-size:13px; color:var(--muted); margin:12px 0 6px; }
  input { width:100%; padding:10px 12px; background:#0d1117; border:1px solid var(--border); border-radius:8px; color:var(--fg); font-size:14px; }
  input:focus { outline:none; border-color:var(--accent); }
  .btn { padding:10px 18px; border:none; border-radius:8px; background:var(--accent2); color:#fff; font-size:14px; font-weight:600; cursor:pointer; transition:.15s; }
  .btn:hover { background:var(--accent); }
  .btn:disabled { opacity:.5; cursor:not-allowed; }
  .btn.ghost { background:transparent; border:1px solid var(--border); color:var(--muted); }
  .row { display:flex; gap:10px; align-items:center; margin-top:18px; }
  .row .grow { flex:1; }
  .msg { font-size:13px; margin-top:10px; min-height:18px; }
  .msg.err { color:var(--err); } .msg.ok { color:var(--ok); }
  .hint { font-size:12px; color:var(--muted); margin-top:8px; line-height:1.5; }
  .hint a { color:var(--accent); }
  /* provider list */
  .plist { display:flex; flex-direction:column; gap:10px; }
  .pcard { display:flex; flex-direction:column; gap:2px; padding:14px 16px; border:1px solid var(--border); border-radius:10px; cursor:pointer; transition:.15s; background:#0d1117; }
  .pcard:hover { border-color:var(--accent); }
  .pcard.sel { border-color:var(--accent); background:#11203a; }
  .pcard .pname { font-size:15px; font-weight:600; }
  .pcard .pdesc { font-size:12px; color:var(--muted); }
  .pcard .ptag { font-size:11px; color:var(--accent); margin-top:2px; }
  /* plugin grid */
  .plugin-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .plug { position:relative; padding:14px 14px 12px; border:1px solid var(--border); border-radius:10px; cursor:pointer; transition:.15s; background:#0d1117; user-select:none; }
  .plug:hover:not(.coming-soon) { border-color:var(--accent); }
  .plug.sel { border-color:var(--accent); background:#11203a; }
  .plug.coming-soon { opacity:.45; cursor:default; }
  .plug-icon { width:32px; height:32px; border-radius:8px; background:var(--accent2); display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; color:#fff; margin-bottom:8px; }
  .plug-name { font-size:14px; font-weight:600; }
  .plug-desc { font-size:12px; color:var(--muted); margin-top:2px; line-height:1.4; }
  .plug-badge { position:absolute; top:10px; right:10px; font-size:10px; background:#21262d; color:var(--muted); padding:2px 6px; border-radius:4px; }
  .plug-check { position:absolute; top:10px; right:10px; width:16px; height:16px; border-radius:4px; border:1px solid var(--border); background:#0d1117; display:flex; align-items:center; justify-content:center; }
  .plug.sel .plug-check { background:var(--accent2); border-color:var(--accent2); }
  .plug.sel .plug-check::after { content:'✓'; color:#fff; font-size:10px; font-weight:700; }
  /* chat */
  .chat { flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:10px; padding:4px; margin-bottom:12px; }
  .bubble { max-width:85%; padding:10px 14px; border-radius:14px; font-size:14px; line-height:1.5; white-space:pre-wrap; }
  .bubble.bot { background:#21262d; align-self:flex-start; border-bottom-left-radius:4px; }
  .bubble.me { background:var(--accent2); color:#fff; align-self:flex-end; border-bottom-right-radius:4px; }
  .typing { color:var(--muted); font-size:13px; align-self:flex-start; }
  .hidden { display:none !important; }
  .spinner { display:inline-block; width:14px; height:14px; border:2px solid rgba(255,255,255,.3); border-top-color:#fff; border-radius:50%; animation:spin .7s linear infinite; vertical-align:-2px; }
  @keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>
<div class="app">
  <div class="brand">VE<span>GA</span> 설치</div>
  <div class="steps">
    <div class="dot active" id="dot0"></div>
    <div class="dot" id="dot1"></div>
    <div class="dot" id="dot2"></div>
  </div>

  <!-- STEP 0: 프로바이더 선택 + 인증 -->
  <div class="card" id="step0">
    <h2>LLM 프로바이더 연결</h2>
    <div class="sub">VEGA가 사용할 추론 백엔드를 고르세요. 연결되면 그 LLM이 나머지 설정을 직접 안내합니다.</div>
    <div class="plist" id="plist"></div>

    <!-- 선택 후 인증 영역 -->
    <div id="authArea" class="hidden">
      <div id="authKey" class="hidden">
        <label id="keyLabel">API Key</label>
        <input id="apiKey" type="password" autocomplete="off">
        <div class="hint" id="keyHint"></div>
        <label>모델 (선택 — 비우면 기본값)</label>
        <input id="modelOverride" placeholder="" autocomplete="off">
      </div>
      <div id="authLocal" class="hidden">
        <label>서버 URL</label>
        <input id="localUrl" placeholder="http://localhost:1234/v1" autocomplete="off">
        <label>모델 이름 (선택)</label>
        <input id="localModel" placeholder="" autocomplete="off">
      </div>
      <div id="authPkce" class="hidden">
        <div class="hint">브라우저가 열리면 로그인하세요. 키 입력은 필요 없습니다.</div>
      </div>
      <div class="msg" id="pMsg"></div>
      <div class="row">
        <button class="btn ghost" id="pBack">← 다른 프로바이더</button>
        <div class="grow"></div>
        <button class="btn" id="pNext">연결</button>
      </div>
    </div>

    <!-- 전체 온보딩 스킵 — 나중에 설정 창에서 연결 -->
    <div class="row" style="margin-top:18px; border-top:1px solid rgba(255,255,255,.08); padding-top:14px;">
      <div class="grow"></div>
      <button class="btn ghost" id="skipOnboarding" title="설정은 나중에 설정 창에서 할 수 있습니다">나중에 설정 — 건너뛰기 →</button>
    </div>
  </div>

  <!-- STEP 1: LLM 대화형 설정 -->
  <div class="card hidden" id="step1">
    <h2>설정 어시스턴트</h2>
    <div class="sub">연결된 LLM이 초기 설정을 진행합니다.</div>
    <div class="chat" id="chat"></div>
    <div class="row">
      <input id="chatInput" class="grow" placeholder="답변을 입력…" autocomplete="off">
      <button class="btn" id="chatSend">보내기</button>
    </div>
  </div>

  <!-- STEP-SANDBOX: 샌드박스 이미지 설치 (Docker OK, 이미지 없을 때만 표시) -->
  <div class="card hidden" id="stepSandbox">
    <h2>코드 실행 환경 준비</h2>
    <div class="sub">VEGA 샌드박스 이미지를 다운로드합니다. 코드 실행·이미지 처리 기능에 필요합니다.</div>
    <div id="sbPullProgress" style="margin:16px 0; font-size:13px; color:var(--muted); min-height:60px; font-family:monospace; white-space:pre-wrap; word-break:break-all; max-height:140px; overflow-y:auto"></div>
    <div id="sbPullBar" style="height:4px; border-radius:2px; background:var(--border); margin-bottom:12px; overflow:hidden">
      <div id="sbPullBarInner" style="height:100%; width:0%; background:var(--accent); transition:width .3s"></div>
    </div>
    <div id="sbPullMsg" class="msg" style="margin-bottom:12px"></div>
    <div class="row">
      <button class="btn ghost" id="sbSkip">건너뛰고 계속</button>
      <div class="grow"></div>
      <button class="btn" id="sbStart">다운로드 시작</button>
    </div>
  </div>

  <!-- STEP 2: 워크플레이스 플러그인 선택 + 순차 연결 -->
  <div class="card hidden" id="step2">
    <!-- 2a: 선택 화면 -->
    <div id="plugSelect">
      <h2>워크플레이스 연결</h2>
      <div class="sub">연결할 서비스를 고르세요. 온보딩 후에도 언제든 추가할 수 있습니다.</div>
      <div class="plugin-grid" id="plugGrid"></div>
      <div id="sysNotice" class="hidden" style="margin-top:14px; font-size:12px; color:var(--muted); line-height:1.5"></div>
      <div class="row" style="margin-top:20px">
        <button class="btn ghost" id="plugSkipAll">건너뛰기</button>
        <div class="grow"></div>
        <button class="btn" id="plugConnect">선택한 서비스 연결</button>
      </div>
    </div>
    <!-- 2b: 개별 연결 진행 화면 (선택 후 순서대로 표시) -->
    <div id="plugAuth" class="hidden">
      <h2 id="plugAuthTitle">연결 중…</h2>
      <div class="sub" id="plugAuthDesc"></div>
      <div class="hint" id="plugAuthHint"></div>
      <div class="msg" id="plugAuthMsg"></div>
      <div class="row" style="margin-top:16px">
        <button class="btn ghost" id="plugAuthSkip">이 서비스 건너뛰기</button>
        <div class="grow"></div>
        <button class="btn" id="plugAuthBtn">연결</button>
      </div>
      <div style="margin-top:14px; font-size:12px; color:var(--muted)" id="plugProgress"></div>
    </div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
function setStep(n){ [0,1,2].forEach(i=>{ $('step'+i).classList.toggle('hidden', i!==n);
  const d=$('dot'+i); d.classList.toggle('active', i===n); d.classList.toggle('done', i<n); }); }
async function api(path, body){ const r=await fetch(path,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body||{})}); return r.json(); }
function gotoChat(){ location.href='/chat'; }

// Tauri WebView엔 새 탭이 없으므로 외부 브라우저로 열어야 한다.
// 이 페이지는 remote 콘텐츠(localhost:8100)라 invoke(open_url)는 ACL에 막힌다 —
// open-settings와 동일하게 core:event로 emit하고 Rust 쪽 listen_any가 브라우저를 연다.
async function openExternal(path){
  const url = path.startsWith('http') ? path : (location.origin + path);
  const emit = window.__TAURI__?.event?.emit;
  if (emit){
    try { await emit('open-url', url); return true; }
    catch(e){ console.error('open-url emit 실패:', e); }
  }
  const invoke = window.__TAURI__?.core?.invoke ?? window.__TAURI__?.invoke;
  if (invoke){
    try { await invoke('open_url', { url }); return true; }
    catch(e){ console.error('open_url 실패:', e); }
  }
  const w = window.open(url, '_blank');
  return !!w;
}

let PROVIDERS = [];
let PLUGINS = [];
let selected = null;

// ── STEP 0: 프로바이더 목록 렌더 ─────────────────────────────────────
function renderProviders(){
  const list = $('plist'); list.innerHTML='';
  for(const p of PROVIDERS){
    const el=document.createElement('div'); el.className='pcard'; el.dataset.id=p.id;
    const tag = p.auth==='pkce' ? '브라우저 로그인' : p.auth==='local' ? 'URL 입력' : 'API 키';
    el.innerHTML = `<div class="pname">${p.label}</div><div class="pdesc">${p.desc||''}</div><div class="ptag">${tag}</div>`;
    el.onclick = ()=> selectProvider(p.id);
    list.appendChild(el);
  }
}
function selectProvider(id){
  selected = PROVIDERS.find(p=>p.id===id);
  document.querySelectorAll('.pcard').forEach(c=>c.classList.toggle('sel', c.dataset.id===id));
  $('authArea').classList.remove('hidden');
  $('authKey').classList.toggle('hidden', selected.auth!=='key');
  $('authLocal').classList.toggle('hidden', selected.auth!=='local');
  $('authPkce').classList.toggle('hidden', selected.auth!=='pkce');
  $('pMsg').textContent='';
  if(selected.auth==='key'){
    $('keyLabel').textContent = selected.label+' API Key';
    $('apiKey').value=''; $('apiKey').placeholder = selected.key_hint||'';
    $('keyHint').innerHTML = keyHintHtml(selected.id);
    $('modelOverride').placeholder = selected.default_model||'';
  } else if(selected.auth==='local'){
    $('localUrl').value = selected.default_url||'';
    $('localModel').value='';
  }
  $('pNext').textContent = selected.auth==='pkce' ? '브라우저로 로그인' : '연결';
  $('authArea').scrollIntoView({behavior:'smooth', block:'nearest'});
}
function keyHintHtml(id){
  const links = { anthropic:['console.anthropic.com','https://console.anthropic.com/settings/keys'],
    openai:['platform.openai.com','https://platform.openai.com/api-keys'],
    openrouter:['openrouter.ai/keys','https://openrouter.ai/keys'] };
  const l = links[id]; return l ? `키 발급: <a href="${l[1]}" target="_blank">${l[0]}</a>` : '';
}
$('pBack').onclick = ()=>{ $('authArea').classList.add('hidden'); selected=null;
  document.querySelectorAll('.pcard').forEach(c=>c.classList.remove('sel')); };

$('pNext').onclick = async ()=>{
  if(!selected) return;
  const msg=$('pMsg'); $('pNext').disabled=true;
  msg.className='msg'; msg.innerHTML='<span class="spinner"></span> 연결 중…';
  let res;
  try{
    if(selected.auth==='pkce'){
      res = await api('/api/onboarding/pkce', {provider:selected.id});
    } else if(selected.auth==='local'){
      res = await api('/api/onboarding/provider', {provider:selected.id, base_url:$('localUrl').value, model:$('localModel').value});
    } else {
      res = await api('/api/onboarding/provider', {provider:selected.id, api_key:$('apiKey').value, model:$('modelOverride').value});
    }
  }catch(e){ res={ok:false, error:String(e)}; }
  $('pNext').disabled=false;
  if(!res.ok){ msg.className='msg err'; msg.textContent=res.error||'연결 실패'; return; }
  msg.className='msg ok';
  msg.textContent = (selected.auth==='local' && res.reachable===false) ? '등록됨 (서버 아직 미응답 — 나중에 켜도 됩니다)' : '연결됨!';
  setStep(1); startChat();
};

// ── STEP 1: LLM 대화 ─────────────────────────────────────────────────
let history=[];
function addBubble(t,who){ const b=document.createElement('div'); b.className='bubble '+who; b.textContent=t; $('chat').appendChild(b); $('chat').scrollTop=$('chat').scrollHeight; return b; }
function showTyping(){ const t=document.createElement('div'); t.className='typing'; t.id='typing'; t.innerHTML='<span class="spinner"></span> 입력 중…'; $('chat').appendChild(t); $('chat').scrollTop=$('chat').scrollHeight; }
function hideTyping(){ const t=$('typing'); if(t) t.remove(); }
async function turn(){
  showTyping(); $('chatSend').disabled=true;
  const res = await api('/api/onboarding/chat', {messages:history});
  hideTyping(); $('chatSend').disabled=false;
  if(!res.ok){ addBubble(res.error||'LLM 오류','bot'); return; }
  if(res.reply){ addBubble(res.reply,'bot'); history.push({role:'assistant',content:res.reply}); }
  for(const d of (res.directives||[])){
    if(d.action==='google_auth' || d.action==='finish'){
      addBubble('좋아요. 마지막으로 연결할 서비스를 고를게요.','bot');
      setTimeout(async ()=>{
        const wentSandbox = await maybeEnterSandboxStep();
        if(!wentSandbox) enterPluginStep();
      }, 800);
      return;
    }
  }
}
function startChat(){ history=[]; turn(); }
$('chatSend').onclick = async ()=>{ const v=$('chatInput').value.trim(); if(!v) return; addBubble(v,'me'); history.push({role:'user',content:v}); $('chatInput').value=''; await turn(); };
$('chatInput').addEventListener('keydown', e=>{ if(e.key==='Enter') $('chatSend').click(); });

// ── STEP 2: 플러그인 선택 ─────────────────────────────────────────────
let selectedPlugins = new Set();

function renderPlugins(){
  const grid = $('plugGrid'); grid.innerHTML='';
  for(const p of PLUGINS){
    const el = document.createElement('div');
    const coming = p.status === 'coming_soon';
    el.className = 'plug' + (coming ? ' coming-soon' : '') + (p.authenticated ? ' sel' : '');
    el.dataset.id = p.id;
    if(p.authenticated) selectedPlugins.add(p.id);
    const badge = coming
      ? `<div class="plug-badge">곧 출시</div>`
      : `<div class="plug-check"></div>`;
    el.innerHTML = `${badge}<div class="plug-icon">${p.icon||p.id[0].toUpperCase()}</div><div class="plug-name">${p.label}</div><div class="plug-desc">${p.desc||''}</div>`;
    if(!coming){
      el.onclick = ()=>{
        if(selectedPlugins.has(p.id)) selectedPlugins.delete(p.id);
        else selectedPlugins.add(p.id);
        el.classList.toggle('sel', selectedPlugins.has(p.id));
        $('plugConnect').textContent = selectedPlugins.size
          ? `${selectedPlugins.size}개 서비스 연결`
          : '선택한 서비스 연결';
      };
    }
    grid.appendChild(el);
  }
  $('plugConnect').textContent = selectedPlugins.size
    ? `${selectedPlugins.size}개 서비스 연결`
    : '선택한 서비스 연결';
}

async function enterPluginStep(){
  setStep(2);
  $('plugSelect').classList.remove('hidden');
  $('plugAuth').classList.add('hidden');
  renderPlugins();
  showSystemNotice();
}

// 선택 의존성 안내 (비차단, INT-1453) — Docker 없으면 코드 실행 도구만 비활성임을 알린다.
async function showSystemNotice(){
  try{
    const r = await fetch('/api/onboarding/system-check'); const s = await r.json();
    if(s.docker && !s.docker.available){
      const el = $('sysNotice');
      el.innerHTML = 'ℹ️ ' + (s.docker.hint || 'Docker 미설치 — 코드 실행 도구만 비활성화됩니다.')
        + ' <a href="#" id="sysDockerLink">Docker Desktop 설치</a>';
      el.classList.remove('hidden');
      $('sysDockerLink').onclick = (e)=>{ e.preventDefault(); openExternal(s.docker.install_url); };
    }
  }catch(e){ /* 백엔드 미지원 시 조용히 무시 */ }
}

// ── 샌드박스 이미지 설치 단계 ────────────────────────────────────────────
async function maybeEnterSandboxStep(){
  // Docker OK인데 이미지가 없으면 pull 단계를 선제적으로 표시한다.
  try{
    const r = await fetch('/api/onboarding/system-check');
    const s = await r.json();
    const dockerOk = s.docker && s.docker.available;
    const imgReady = s.sandbox_image && s.sandbox_image.ready;
    if(dockerOk && !imgReady){
      showSandboxStep();
      return true; // 샌드박스 단계로 진입함
    }
  }catch(e){ /* 백엔드 미지원 시 건너뜀 */ }
  return false;
}

function showSandboxStep(){
  // step2 dot을 재활용 — 시각적으로 "추가 스텝"처럼 표시
  [0,1,2].forEach(i=>{
    $('step'+i).classList.add('hidden');
    const d=$('dot'+i);
    d.classList.toggle('active', i===2);
    d.classList.toggle('done', i<2);
  });
  $('stepSandbox').classList.remove('hidden');

  const log = $('sbPullProgress');
  const bar = $('sbPullBarInner');
  const msg = $('sbPullMsg');
  let pulling = false;

  $('sbSkip').onclick = ()=>{ enterPluginStep(); };

  $('sbStart').onclick = async ()=>{
    if(pulling) return;
    pulling = true;
    $('sbStart').disabled = true;
    $('sbSkip').disabled = true;
    log.textContent = '';
    msg.textContent = '';
    msg.className = 'msg';

    let lineCount = 0;
    const es = new EventSource('/api/sandbox/pull');

    es.onmessage = (e)=>{
      lineCount++;
      log.textContent += e.data + '\n';
      log.scrollTop = log.scrollHeight;
      // 진행 바 — 정확한 % 없으니 줄 수로 근사
      const pct = Math.min(95, lineCount * 3);
      bar.style.width = pct + '%';
    };

    es.addEventListener('done', ()=>{
      es.close();
      bar.style.width = '100%';
      msg.className = 'msg ok';
      msg.textContent = '샌드박스 이미지 준비 완료!';
      setTimeout(()=> enterPluginStep(), 1200);
    });

    es.addEventListener('error', (e)=>{
      es.close();
      msg.className = 'msg err';
      msg.textContent = '다운로드 실패: ' + (e.data || '알 수 없는 오류');
      $('sbStart').disabled = false;
      $('sbStart').textContent = '다시 시도';
      $('sbSkip').disabled = false;
      pulling = false;
    });

    es.onerror = ()=>{
      if(es.readyState === EventSource.CLOSED) return; // done/error 이벤트가 먼저 닫음
      es.close();
      msg.className = 'msg err';
      msg.textContent = '연결 오류 — Docker가 실행 중인지 확인해 주세요.';
      $('sbStart').disabled = false;
      $('sbStart').textContent = '다시 시도';
      $('sbSkip').disabled = false;
      pulling = false;
    };
  };
}

$('plugSkipAll').onclick = finishOnboarding;
$('plugConnect').onclick = ()=>{
  const queue = PLUGINS.filter(p => selectedPlugins.has(p.id) && p.status === 'available');
  if(!queue.length){ finishOnboarding(); return; }
  $('plugSelect').classList.add('hidden');
  $('plugAuth').classList.remove('hidden');
  runPluginQueue(queue, 0);
};

// 선택한 플러그인을 queue 순서대로 순차 연결
let activePoll = null;
function stopActivePoll(){ if(activePoll){ clearInterval(activePoll); activePoll=null; } }

function runPluginQueue(queue, idx){
  if(idx >= queue.length){ finishOnboarding(); return; }
  const p = queue[idx];
  const next = ()=> runPluginQueue(queue, idx+1);

  stopActivePoll();
  $('plugAuthTitle').textContent = p.label + ' 연결';
  $('plugAuthDesc').textContent = p.desc || '';
  $('plugAuthHint').textContent = '브라우저가 열리면 동의 화면을 완료해 주세요. 완료 후 이 창으로 돌아오면 자동으로 처리됩니다.';
  $('plugAuthMsg').className = 'msg';
  $('plugAuthMsg').textContent = p.authenticated ? '이미 연결돼 있습니다.' : '';
  if(p.authenticated) $('plugAuthMsg').className = 'msg ok';
  $('plugProgress').textContent = `${idx+1} / ${queue.length}`;

  $('plugAuthSkip').onclick = ()=>{ stopActivePoll(); next(); };
  $('plugAuthBtn').disabled = false;
  $('plugAuthBtn').textContent = '연결';
  $('plugAuthBtn').onclick = ()=>{
    const msg = $('plugAuthMsg');
    openExternal(p.auth_path);
    msg.className='msg'; msg.innerHTML='<span class="spinner"></span> 브라우저에서 완료해 주세요…';
    $('plugAuthBtn').disabled = true;
    stopActivePoll();
    let ticks = 0, consecErr = 0;
    activePoll = setInterval(async ()=>{
      ticks++;
      try{
        const r = await fetch(p.status_endpoint);
        if(!r.ok) throw new Error(`HTTP ${r.status}`);
        const s = await r.json();
        consecErr = 0;
        if(s.error){ msg.className='msg err'; msg.textContent = `상태 확인 오류: ${s.error}`; }
        if(s.authenticated){
          stopActivePoll();
          const extra = s.email ? ` (${s.email})` : s.team ? ` (${s.team})` : '';
          msg.className='msg ok'; msg.textContent = p.label + ' 연동 완료!' + extra;
          setTimeout(next, 900);
        }
      }catch(e){
        // 폴링 에러를 조용히 삼키지 않는다 — 연속 3회 실패 시 사용자에게 표시 (INT-1473)
        consecErr++;
        if(consecErr >= 3){
          msg.className='msg err';
          msg.textContent = `상태 확인 실패 (${e.message||e}) — 백엔드 연결을 확인하세요. 계속 재시도 중…`;
        }
      }
      if(ticks>=90){
        stopActivePoll();
        $('plugAuthBtn').disabled=false;
        msg.className='msg err'; msg.textContent='시간 초과 — 완료됐으면 다시 "연결"을 누르거나 건너뛰세요.';
      }
    }, 2000);
  };
}

async function finishOnboarding(){ stopActivePoll(); await api('/api/onboarding/finish',{}); gotoChat(); }

// 전체 온보딩 스킵 — 프로바이더/프로필 없이 바로 채팅으로. 설정은 나중에 설정 창에서.
$('skipOnboarding').onclick = async ()=>{
  const btn = $('skipOnboarding'); btn.disabled = true; btn.textContent = '건너뛰는 중…';
  try { await api('/api/onboarding/finish', {}); }
  catch(e){ /* finish 실패해도 채팅으로는 보낸다 — 온보딩에 갇히지 않게 */ }
  gotoChat();
};

// ── 초기화 ───────────────────────────────────────────────────────────
(async ()=>{
  try{
    const r=await fetch('/api/onboarding'); const s=await r.json();
    if(s.onboarded){ gotoChat(); return; }
    PROVIDERS = s.providers||[];
    PLUGINS = (s.plugins||[]).filter(p => p.configured || p.status === 'coming_soon');
    renderProviders();
  }catch(e){ $('plist').innerHTML='<div class="msg err">프로바이더 목록 로드 실패</div>'; }
})();
</script>
