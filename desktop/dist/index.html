<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <title>VEGA</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        background: #0d1117; color: #8b949e;
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        height: 100vh;
        -webkit-user-select: none; user-select: none;
      }
      .logo {
        font-size: 30px; font-weight: 700; color: #e6edf3;
        letter-spacing: -1px; margin-bottom: 28px;
      }
      .bar {
        width: 240px; height: 4px; border-radius: 4px;
        background: #21262d; overflow: hidden;
      }
      .fill {
        height: 100%; width: 0%;
        background: linear-gradient(90deg, #388bfd, #58a6ff);
        border-radius: 4px;
        transition: width 0.45s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .row {
        width: 240px; margin-top: 12px;
        display: flex; justify-content: space-between; align-items: baseline;
      }
      .label { font-size: 12px; color: #8b949e; }
      .pct { font-size: 12px; color: #484f58; font-variant-numeric: tabular-nums; }
    </style>
  </head>
  <body>
    <div class="logo">VEGA</div>
    <div class="bar"><div class="fill" id="fill"></div></div>
    <div class="row">
      <span class="label" id="label">시작하는 중…</span>
      <span class="pct" id="pct">0%</span>
    </div>
    <script>
      // Rust(wait_and_navigate)가 부팅 단계마다 window.vegaProgress(pct, label)를 호출.
      // 호출이 끊겨도(예: 빠른 부팅) 화면이 멈춰 보이지 않도록, 목표치까지
      // 부드럽게 차오르는 자체 트윈을 둔다. Rust가 더 높은 목표를 주면 그쪽을 따른다.
      let target = 0;       // Rust가 지정한 목표 %
      let shown = 0;        // 화면에 보이는 %
      const fill = document.getElementById('fill');
      const pctEl = document.getElementById('pct');
      const labelEl = document.getElementById('label');

      function render() {
        // 목표보다 낮으면 천천히 따라붙는다(끊김 방지용 미세 보간).
        if (shown < target) {
          shown += Math.max(0.5, (target - shown) * 0.18);
          if (shown > target) shown = target;
        }
        const v = Math.min(100, Math.round(shown));
        fill.style.width = v + '%';
        pctEl.textContent = v + '%';
        requestAnimationFrame(render);
      }
      requestAnimationFrame(render);

      // Rust에서 호출하는 진입점.
      window.vegaProgress = function (pct, label) {
        if (typeof pct === 'number' && pct > target) target = Math.min(100, pct);
        if (label) labelEl.textContent = label;
      };

      // Rust 신호가 전혀 없을 때(이론상)를 대비한 완만한 자동 진행 — 85%에서 멈춤.
      let auto = 0;
      const autoTimer = setInterval(() => {
        auto += 1;
        const ceil = Math.min(85, auto * 2);   // ~42회(약 8초)에 85% 도달
        if (ceil > target) target = ceil;
        if (target >= 85) clearInterval(autoTimer);
      }, 200);
    </script>
  </body>
</html>
