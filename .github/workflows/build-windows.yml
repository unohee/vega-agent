name: Build Windows

# main 푸시마다 Windows NSIS 인스톨러(x64)를 빌드해 GitHub Release 에 첨부한다.
# macOS DMG(release-dmg.yml, self-hosted)와 달리 GitHub-hosted windows-latest 러너 사용 —
# PyInstaller 는 크로스 컴파일이 불가해 Windows 백엔드는 Windows 에서만 빌드된다 (INT-1438).
# Windows 코드사이닝 인증서는 아직 없음 → 인스톨러는 unsigned (SmartScreen 경고 감수).
# updater 서명(.sig)은 macOS 와 같은 TAURI_SIGNING_PRIVATE_KEY 로 생성된다.

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'bin/vega'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-windows
  cancel-in-progress: false

jobs:
  # 백엔드 전체 pytest 를 Windows 에서 실행 — keychain 가드·data_paths·pty 가드 등
  # Windows 코드 경로 회귀를 매 푸시 자동 검증한다 (INT-1448). 빌드 job 과 병렬.
  test-windows:
    name: pytest (Windows)
    runs-on: windows-latest
    timeout-minutes: 30

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # tzdata: Windows 시스템 tz DB 부재 / xdist: pytest.ini -n auto
          pip install pytest pytest-asyncio pytest-xdist tzdata

      - name: pytest
        env:
          # 러너 사용자 프로필 오염 방지 — 사용자 데이터 루트를 temp 로 격리
          VEGA_DATA_DIR: ${{ runner.temp }}\vega-test-data
        run: |
          # test_echo_reconnect_ui 는 main 에서 이미 깨져 있는 사전 존재 실패 (INT-1445) — 신호 유지를 위해 제외
          python -m pytest tests/ -m "not deepeval" --deselect tests/test_echo_reconnect_ui.py::test_echo_reconnect_no_duplication

  build-windows:
    name: Build NSIS installer (x64)
    runs-on: windows-latest
    timeout-minutes: 90

    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 버전 읽기 (tauri.conf.json)
        id: version
        run: |
          $v = (Get-Content desktop/tauri.conf.json -Raw | ConvertFrom-Json).version
          if (-not $v) { Write-Error "tauri.conf.json 에서 버전을 읽지 못함"; exit 1 }
          "version=$v" >> $env:GITHUB_OUTPUT
          "VERSION=$v" >> $env:GITHUB_ENV
          Write-Host "빌드 버전: $v"

      - name: Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: OAuth client 시크릿 주입 (gitignore된 파일 복원)
        env:
          SLACK_OAUTH_CLIENT_JSON: ${{ secrets.SLACK_OAUTH_CLIENT_JSON }}
          GOOGLE_OAUTH_CLIENT_JSON: ${{ secrets.GOOGLE_OAUTH_CLIENT_JSON }}
        run: |
          # slack 은 vega-backend.spec datas 에 무조건 포함 — 없으면 PyInstaller 가 죽는다.
          if (-not $env:SLACK_OAUTH_CLIENT_JSON) { Write-Error "SLACK_OAUTH_CLIENT_JSON secret 미설정"; exit 1 }
          New-Item -ItemType Directory -Force -Path data | Out-Null
          [IO.File]::WriteAllText("$PWD/data/slack_oauth_client.json", $env:SLACK_OAUTH_CLIENT_JSON)
          # Windows Python open() 기본 인코딩은 cp1252 — JSON 내 비-ASCII(한글 _note 등)면
          # UnicodeDecodeError(byte 0x8d). 항상 utf-8로 읽어야 한다.
          python -c "import json;json.load(open('data/slack_oauth_client.json',encoding='utf-8'));print('slack_oauth_client.json OK')"
          if ($env:GOOGLE_OAUTH_CLIENT_JSON) {
            [IO.File]::WriteAllText("$PWD/data/google_oauth_client.json", $env:GOOGLE_OAUTH_CLIENT_JSON)
            python -c "import json;json.load(open('data/google_oauth_client.json',encoding='utf-8'));print('google_oauth_client.json OK')"
          } else {
            Write-Warning "GOOGLE_OAUTH_CLIENT_JSON 미설정 — Google OAuth 미번들"
          }

      - name: 배포 기본 키 번들 (bin/bundle_env/.env)
        env:
          VEGA_SEARXNG_KEY: ${{ secrets.VEGA_SEARXNG_KEY }}
        run: |
          if ($env:VEGA_SEARXNG_KEY) {
            New-Item -ItemType Directory -Force -Path bin/bundle_env | Out-Null
            [IO.File]::WriteAllText("$PWD/bin/bundle_env/.env", "VEGA_SEARXNG_KEY=$($env:VEGA_SEARXNG_KEY)`n")
            Write-Host "bundle_env/.env OK"
          } else {
            Write-Warning "VEGA_SEARXNG_KEY 미설정 — 배포본 web_search 키 미번들"
          }

      - name: Python 의존성 설치
        # macOS DMG 빌드 venv(arm64_vega_env)와 동일한 최소 패키지 집합 — pandas/playwright
        # 등 무거운 선택 의존성은 frozen 앱에서 lazy import 실패를 감수하고 제외한다.
        run: |
          python -m pip install --upgrade pip
          # tzdata: Windows 엔 시스템 tz DB 가 없어 ZoneInfo("Asia/Seoul") 에 필수
          # markdown: Superthread 카드 content HTML 변환 (INT-1571). pyairtable: Airtable 도구 (INT-1498/1570).
          pip install pyinstaller uvicorn fastapi starlette sse-starlette fastmcp httpx httpx-sse openai anthropic tenacity aiosqlite aiofiles aiohttp tiktoken certifi pydantic pydantic-settings python-multipart python-dotenv keyring requests rich pyyaml websockets tzdata markdown pyairtable

      - name: PyInstaller — vega-backend.exe
        run: |
          pyinstaller bin/vega-backend.spec --distpath bin/dist_win --workpath bin/build_pyinstaller_win --noconfirm
          if (-not (Test-Path "bin/dist_win/vega-backend.exe")) { Write-Error "vega-backend.exe 빌드 실패"; exit 1 }
          Write-Host ("vega-backend.exe: {0:N1} MB" -f ((Get-Item bin/dist_win/vega-backend.exe).Length / 1MB))

      - name: 백엔드 smoke test (/api/health)
        # 빌드만 통과하고 기동이 깨지는 회귀를 CI 에서 잡는다 — Windows 실기 검증은 이 단계가 유일.
        run: |
          $env:VEGA_DATA_DIR = "$env:RUNNER_TEMP\vega-data"
          $p = Start-Process -FilePath "bin/dist_win/vega-backend.exe" -PassThru -NoNewWindow `
                -RedirectStandardOutput "$env:RUNNER_TEMP\backend.out.log" `
                -RedirectStandardError "$env:RUNNER_TEMP\backend.err.log"
          $ok = $false
          foreach ($i in 1..60) {
            Start-Sleep -Seconds 2
            if ($p.HasExited) { Write-Warning "백엔드 프로세스 조기 종료 (exit=$($p.ExitCode))"; break }
            try {
              $r = Invoke-RestMethod -Uri "http://127.0.0.1:8100/api/health" -TimeoutSec 3
              if ($r.app -eq "vega-agent") { $ok = $true; break }
            } catch {}
          }
          Write-Host "--- backend stdout (tail) ---"
          Get-Content "$env:RUNNER_TEMP\backend.out.log" -Tail 60 -ErrorAction SilentlyContinue
          Write-Host "--- backend stderr (tail) ---"
          Get-Content "$env:RUNNER_TEMP\backend.err.log" -Tail 60 -ErrorAction SilentlyContinue
          if (-not $p.HasExited) { Stop-Process -Id $p.Id -Force }
          if (-not $ok) { Write-Error "백엔드 /api/health smoke test 실패"; exit 1 }
          Write-Host "✓ /api/health 200 (app=vega-agent)"

      - name: externalBin 배치 (타겟 suffix)
        run: Copy-Item "bin/dist_win/vega-backend.exe" "bin/vega-backend-x86_64-pc-windows-msvc.exe"

      - name: Rust 캐시
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop

      - name: Tauri build (NSIS)
        working-directory: desktop
        run: npx --yes "@tauri-apps/cli@2" build

      - name: 산출물 확인/정리
        id: artifacts
        run: |
          $nsis = Get-ChildItem "desktop/target/release/bundle/nsis" -Filter "*-setup.exe" -ErrorAction Stop
          if (-not $nsis) { Write-Error "NSIS 인스톨러 없음"; exit 1 }
          New-Item -ItemType Directory -Force -Path build_output | Out-Null
          Copy-Item $nsis.FullName "build_output/"
          $sig = "$($nsis.FullName).sig"
          if (Test-Path $sig) { Copy-Item $sig "build_output/" } else { Write-Warning "updater .sig 없음 (서명 키 미설정?)" }
          Get-ChildItem build_output | ForEach-Object { Write-Host ("{0}  {1:N1} MB" -f $_.Name, ($_.Length / 1MB)) }
          Get-FileHash build_output/*-setup.exe -Algorithm SHA256 | Format-List

      - name: Artifact 업로드
        uses: actions/upload-artifact@v4
        with:
          name: VEGA-${{ steps.version.outputs.version }}-windows-x64
          path: |
            build_output/*-setup.exe
            build_output/*-setup.exe.sig
          if-no-files-found: error

      - name: R2 업로드 (updater 자산 + latest.json 병합) — download.intrect.io
        # macOS(release-dmg.yml)와 대칭 — Windows 자동 업데이트 배선 (INT-1372 후속).
        # Tauri v2 NSIS 는 setup.exe 자체를 updater 로 재사용하고 setup.exe.sig 를 생성한다
        # (별도 .nsis.zip 아님). 그 둘을 R2 v<ver>/ 에 올리고 latest.json 의 windows-x86_64
        # 항목을 병합한다. GitHub-hosted 러너라 wrangler OAuth 가 없으므로 CF 토큰 시크릿 필수.
        # 시크릿 미설정 시 자동 업데이트만 건너뛰고 빌드는 성공 처리(설치본은 Release 로 배포됨).
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if (-not $env:CLOUDFLARE_API_TOKEN -or -not $env:CLOUDFLARE_ACCOUNT_ID) {
            Write-Warning "CLOUDFLARE_API_TOKEN/ACCOUNT_ID 미설정 — R2 업로드 건너뜀(자동 업데이트 미배선)"
            exit 0
          }
          $sig = Get-ChildItem build_output -Filter "*-setup.exe.sig" -ErrorAction SilentlyContinue
          if (-not $sig) { Write-Warning "updater .sig 없음 — R2 업로드 건너뜀"; exit 0 }

          $bucket = "intrect-downloads"
          $prefix = "vega/updates"
          # PowerShell 문자열 보간에서 $env:VERSION 의 ':' 모호성을 피하려 평범한 변수로 받는다.
          $ver = $env:VERSION

          # 1) R2 의 현재 latest.json 을 받아 병합 소스로
          $prev = "build_output/_prev_latest.json"
          npx --yes wrangler r2 object get "$bucket/$prefix/latest.json" --file $prev --remote 2>$null
          if (Test-Path $prev) { Write-Host "기존 latest.json 받음 → 병합 소스" }
          else { Write-Host "기존 latest.json 없음 → 신규 생성" }

          # 2) windows-x86_64 항목만 갱신, darwin 항목 보존(같은 버전일 때)
          $mergeArg = if (Test-Path $prev) { @("--merge-from", $prev) } else { @() }
          python scripts/make_latest_json.py $ver --windows @mergeArg
          if (-not (Test-Path build_output/latest.json)) { Write-Error "latest.json 생성 실패"; exit 1 }

          # 3) updater 자산(setup.exe + .sig) 업로드 — v<ver>/
          $setup = Get-ChildItem build_output -Filter "*-setup.exe" | Select-Object -First 1
          foreach ($f in @($setup.FullName, "$($setup.FullName).sig")) {
            $name = Split-Path $f -Leaf
            Write-Host "→ R2: $prefix/v$ver/$name"
            npx --yes wrangler r2 object put "$bucket/$prefix/v$ver/$name" --file $f --remote
          }
          # 4) latest.json 마지막에 덮어쓰기 — no-cache 로 R2 캐시 HIT 방지
          Write-Host "→ R2: $prefix/latest.json"
          npx --yes wrangler r2 object put "$bucket/$prefix/latest.json" `
            --file build_output/latest.json `
            --content-type "application/json" `
            --cache-control "no-cache, max-age=0" --remote
          Write-Host "✓ R2 업로드 완료 — https://download.intrect.io/$prefix/latest.json"

      - name: 업데이트 매니페스트 검증 (windows-x86_64)
        # R2 업로드한 setup.exe 가 공개 도메인에서 올바른 버전·서명·HTTP 200 으로 받아지는지.
        # 표준 urllib 은 CF 봇 보호에 막혀(2026-06-19 실측) verify script 가 requests 사용(위 설치 목록 포함).
        # CF 토큰 미설정이면 R2 업로드를 건너뛰었으므로 검증도 건너뛴다.
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if (-not $env:CLOUDFLARE_API_TOKEN) {
            Write-Warning "R2 미배선(CF 토큰 없음) — 업데이트 매니페스트 검증 건너뜀"; exit 0
          }
          python scripts/verify_update_manifest.py "${{ steps.version.outputs.version }}" --platforms windows-x86_64 --no-version-match

      - name: GitHub Release 에 첨부
        # latest.json/_prev_latest.json 은 R2 전용이라 Release 에는 setup.exe(+sig)만 올린다.
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: VEGA v${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          files: |
            build_output/*-setup.exe
            build_output/*-setup.exe.sig
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
