name: Release DMG

# main 에 푸시될 때마다 tauri.conf.json 의 버전으로 DMG(arm64 + x86_64)를
# 빌드·공증하고 GitHub Release 로 배포한다. 버전 bump 는 개발자가 의도적으로
# tauri.conf.json/Cargo.toml 을 올려야 하며, 같은 버전이면 그 Release 를 갱신한다.
# 수동 실행(workflow_dispatch)도 지원.

on:
  push:
    branches: [main]
    # DMG 산출물에 영향 없는 변경은 빌드를 건너뛴다(불필요한 풀빌드 방지).
    # 문서·개발 CLI(bin/vega)만 제외. 실제 빌드되는 코드(web/·pipeline/·desktop/·
    # bin/vega-backend.spec 등)와 워크플로우(.github)는 그대로 트리거된다.
    # 주의: paths-ignore 는 negation(!)을 지원하지 않으므로 .github 는 제외 목록에
    #       넣지 않는다(워크플로우 변경 시 빌드 검증이 돌아야 함).
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'bin/vega'
  workflow_dispatch:

# Release 생성/에셋 업로드에 contents:write 필요.
permissions:
  contents: write
  packages: write

# 동시에 여러 빌드가 같은 Release 를 건드리지 않도록 직렬화.
concurrency:
  group: release-dmg
  cancel-in-progress: false

jobs:
  build-and-release:
    name: Build DMG (arm64 + x86_64) & Release
    runs-on: [self-hosted, macOS, ARM64]
    timeout-minutes: 90

    env:
      # self-hosted runner 의 비대화형 셸엔 ~/.zshrc PATH 가 안 실린다.
      # rustup/cargo/cargo-tauri(~/.cargo/bin), homebrew(/opt/homebrew/bin),
      # 기타 사용자 바이너리(~/.local/bin)를 명시적으로 prepend.
      PATH: "/Users/unohee/.cargo/bin:/Users/unohee/.local/bin:/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin"
      VEGA_SIGN_ID: "Developer ID Application: Heewon Oh (635QK74RYK)"
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      # 배포본 동봉 검색 키 — build_dmg.sh [pre] 가 bin/bundle_env/.env 로 굽는다.
      # CI 러너엔 repo .env(gitignore)가 없으므로 이 시크릿이 유일한 출처 (INT-1432).
      VEGA_SEARXNG_KEY: ${{ secrets.VEGA_SEARXNG_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: vega-sandbox 이미지 빌드 & GHCR 푸시
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          # arm64 네이티브 빌드 (self-hosted ARM64 러너) — linux/amd64 크로스 빌드는 제외
          # (샌드박스는 macOS Docker Desktop VM이 직접 실행하므로 linux/amd64 단일 플랫폼이면 충분)
          docker build \
            --platform linux/amd64 \
            -t ghcr.io/unohee/vega-sandbox:latest \
            sandbox/
          docker push ghcr.io/unohee/vega-sandbox:latest

      - name: 버전 읽기 (tauri.conf.json)
        id: version
        run: |
          VERSION=$(/usr/bin/python3 -c "import json;print(json.load(open('desktop/tauri.conf.json'))['version'])")
          if [ -z "$VERSION" ]; then echo "::error::tauri.conf.json 에서 버전을 읽지 못함"; exit 1; fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "빌드 버전: $VERSION"

      - name: build_dmg.sh 버전 동기화
        run: |
          # build_dmg.sh 안의 VERSION= 도 tauri.conf 와 맞춘다(혹시 어긋났을 때 대비).
          sed -i '' "s/^VERSION=\"[^\"]*\"/VERSION=\"$VERSION\"/" scripts/build_dmg.sh

      - name: Rust 타겟 확인
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: PyInstaller venv 확인 + 의존성 동기화 (arm64 + x86_64)
        run: |
          if [ ! -x "$HOME/dev/arm64_vega_env/bin/pyinstaller" ]; then
            echo "::error::arm64 PyInstaller 없음 — runner에 ~/dev/arm64_vega_env 구성 필요"; exit 1
          fi
          if [ ! -x "$HOME/dev/intel64_env/bin/pyinstaller" ]; then
            echo "::error::x86_64 PyInstaller 없음 — runner에 ~/dev/intel64_env 구성 필요"; exit 1
          fi
          # 빌드 venv 에 requirements 를 동기화한다. 이게 없으면 사무 패키지(numpy/
          # pandas/openpyxl/pypdf/docx/pptx 등)가 venv 에 없어 collect_submodules 가
          # 빈손이 되고, DMG 가 사무 기능 없는 40MB 로 나온다(2026-06-15 0.1.30 사고).
          # intel64_env 는 universal python 이라 기본 pip 가 arm64 wheel 을 받는다 —
          # x86_64 DMG 에 arm64 .so 가 섞이지 않게 arch -x86_64 로 강제해야 한다.
          "$HOME/dev/arm64_vega_env/bin/pip" install -q -r requirements.txt
          arch -x86_64 "$HOME/dev/intel64_env/bin/pip" install -q -r requirements.txt

      - name: OAuth client 시크릿 주입 (gitignore된 파일 복원)
        env:
          SLACK_OAUTH_CLIENT_JSON: ${{ secrets.SLACK_OAUTH_CLIENT_JSON }}
          GOOGLE_OAUTH_CLIENT_JSON: ${{ secrets.GOOGLE_OAUTH_CLIENT_JSON }}
        run: |
          mkdir -p data
          if [ -z "$SLACK_OAUTH_CLIENT_JSON" ]; then
            echo "::error::SLACK_OAUTH_CLIENT_JSON secret 미설정 — Slack OAuth 번들 불가"; exit 1
          fi
          printf '%s' "$SLACK_OAUTH_CLIENT_JSON" > data/slack_oauth_client.json
          /usr/bin/python3 -c "import json;json.load(open('data/slack_oauth_client.json'));print('slack_oauth_client.json 복원 OK')"
          if [ -n "$GOOGLE_OAUTH_CLIENT_JSON" ]; then
            printf '%s' "$GOOGLE_OAUTH_CLIENT_JSON" > data/google_oauth_client.json
            /usr/bin/python3 -c "import json;json.load(open('data/google_oauth_client.json'));print('google_oauth_client.json 복원 OK')"
          else
            echo "::warning::GOOGLE_OAUTH_CLIENT_JSON 미설정 — Google OAuth 미번들"
          fi

      - name: 공증 프로필 등록 (CI env var → keychain-profile)
        run: |
          xcrun notarytool store-credentials "vega-notary-ci" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD"

      - name: DMG 빌드 (aarch64 + x86_64 + 공증)
        run: |
          VEGA_ARCH=all VEGA_NOTARY_PROFILE=vega-notary-ci bash scripts/build_dmg.sh
        timeout-minutes: 80

      - name: DMG 검증 (공증·서명)
        run: |
          FAIL=0
          for ARCH in aarch64 x86_64; do
            DMG="build_output/VEGA-${VERSION}-${ARCH}.dmg"
            if [ ! -f "$DMG" ]; then echo "::error::$DMG 없음"; FAIL=1; continue; fi
            spctl --assess --type open --context context:primary-signature -v "$DMG" || { echo "::error::$ARCH 공증 검증 실패"; FAIL=1; }
            echo "SHA256 ($ARCH): $(shasum -a 256 "$DMG" | cut -d' ' -f1)"
          done
          [ "$FAIL" = "0" ] || exit 1

      - name: R2 업로드 (updater 자산 + latest.json 병합) — download.intrect.io
        # 리포가 private 이라 updater 익명 GET 은 GitHub Release URL 에 접근 불가 →
        # 공개 R2(intrect-downloads / download.intrect.io)로 서빙 (INT-1432).
        # 버전 자산은 v<ver>/ 아래, latest.json 은 고정 경로(endpoints 가 가리키는 곳)에 올린다.
        #
        # latest.json 병합: macOS(이 워크플로)와 Windows(build-windows.yml)가 분리돼
        # 각자 같은 latest.json 을 쓴다. R2 의 현재 latest.json 을 먼저 받아 --merge-from 으로
        # darwin 항목만 갱신하고 windows 항목은 보존한다. 단 버전이 다르면(새 릴리즈) 폐기.
        env:
          # self-hosted runner 의 wrangler OAuth 를 기본 사용. CI 토큰을 쓰려면
          # 두 시크릿을 등록하면 wrangler 가 자동으로 토큰 모드로 동작한다.
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          BUCKET="intrect-downloads"
          PREFIX="vega/updates"

          # 1) R2 의 현재 latest.json 을 받아 병합 소스로 쓴다(없거나 실패해도 신규 생성으로 진행).
          PREV="build_output/_prev_latest.json"
          mkdir -p build_output
          if wrangler r2 object get "${BUCKET}/${PREFIX}/latest.json" --file "$PREV" --remote 2>/dev/null; then
            echo "기존 latest.json 받음 → 병합 소스로 사용"
          else
            echo "기존 latest.json 없음/조회 실패 → 신규 생성"
            rm -f "$PREV"
          fi

          # 2) darwin 항목만 갱신, windows 항목은 보존(같은 버전일 때). 버전 다르면 구버전 폐기.
          /usr/bin/python3 scripts/make_latest_json.py "$VERSION" --macos --merge-from "$PREV"
          if [ ! -f build_output/latest.json ]; then
            echo "::error::build_output/latest.json 없음 — R2 업로드 중단"; exit 1
          fi

          # 3) updater 자산(.app.tar.gz + .sig) 업로드
          for ARCH in aarch64 x86_64; do
            for EXT in app.tar.gz app.tar.gz.sig; do
              F="build_output/updater/VEGA-${VERSION}-${ARCH}.${EXT}"
              [ -f "$F" ] || { echo "::warning::$F 없음 — skip"; continue; }
              echo "→ R2: ${PREFIX}/v${VERSION}/$(basename "$F")"
              wrangler r2 object put "${BUCKET}/${PREFIX}/v${VERSION}/$(basename "$F")" \
                --file "$F" --remote
            done
          done
          # 4) latest.json 은 endpoints 가 가리키는 고정 경로 — 자산 업로드 후 마지막에 덮어써
          # 자산보다 먼저 갱신돼 깨진 매니페스트를 가리키는 창을 없앤다. no-cache 로 R2 캐시 HIT 방지.
          echo "→ R2: ${PREFIX}/latest.json"
          wrangler r2 object put "${BUCKET}/${PREFIX}/latest.json" \
            --file build_output/latest.json \
            --content-type "application/json" \
            --cache-control "no-cache, max-age=0" --remote
          echo "✓ R2 업로드 완료 — https://download.intrect.io/${PREFIX}/latest.json"

      - name: 자동 업데이트 매니페스트 검증 (배포된 latest.json + tar.gz HTTP 200)
        # 업로드 직후 공개 도메인에서 darwin 자산이 올바른 버전·서명·HTTP 200 으로
        # 서빙되는지 확인 — "업데이트가 안 받아짐" 회귀를 릴리즈 시점에 잡는다.
        # 표준 urllib 은 CF 봇 보호에 403 으로 막혀(2026-06-19 실측) verify script 가
        # requests 를 쓴다 → 빌드 venv(arm64_vega_env, requirements 동기화됨)의 python 으로 실행.
        run: |
          "$HOME/dev/arm64_vega_env/bin/python3" scripts/verify_update_manifest.py \
            "${{ steps.version.outputs.version }}" --platforms darwin-aarch64,darwin-x86_64

      - name: GitHub Release 생성/갱신
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: VEGA v${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          # 같은 태그가 있으면 덮어쓴다(재빌드 대응).
          files: |
            build_output/VEGA-${{ steps.version.outputs.version }}-aarch64.dmg
            build_output/VEGA-${{ steps.version.outputs.version }}-x86_64.dmg
            build_output/updater/VEGA-${{ steps.version.outputs.version }}-aarch64.app.tar.gz
            build_output/updater/VEGA-${{ steps.version.outputs.version }}-aarch64.app.tar.gz.sig
            build_output/updater/VEGA-${{ steps.version.outputs.version }}-x86_64.app.tar.gz
            build_output/updater/VEGA-${{ steps.version.outputs.version }}-x86_64.app.tar.gz.sig
            build_output/latest.json
          body: |
            ## VEGA v${{ steps.version.outputs.version }}

            ### 설치
            - **Apple Silicon**: `VEGA-${{ steps.version.outputs.version }}-aarch64.dmg`
            - **Intel Mac**: `VEGA-${{ steps.version.outputs.version }}-x86_64.dmg`

            VEGA.app 을 Applications 폴더로 드래그하세요. 첫 실행 시 백그라운드 데몬이 자동 등록됩니다.

            > 공증 완료 — Gatekeeper 경고 없이 설치됩니다. 기존 설치본은 자동 업데이트됩니다.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 공증 프로필 정리
        if: always()
        run: |
          security delete-generic-password -s "com.apple.gke.notarytool.account" 2>/dev/null || true
