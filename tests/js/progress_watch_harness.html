<!doctype html>
<!-- Created: 2026-06-05
     Purpose: chat.html 진행표시 워치독(startProgressWatch/_hasSpinningTool/markProgress)을
              실제 브라우저 DOM + 타이머 위에서 검증. 도구갭/토큰끊김/재접속 3케이스.
     Usage: Chrome --headless 로 로드 → window.__RESULT__ 에 결과 JSON. -->
<html><head><meta charset="utf-8"></head><body>
<div id="stage"></div>
<script>
// ── chat.html에서 워치독 관련 함수만 추출해 주입 (테스트 대상 코드 = 운영 코드) ──
async function loadFns() {
  const html = await fetch('../../web/static/chat.html').then(r => r.text());
  const m = html.match(/<script(?![^>]*\bsrc=)[^>]*>([\s\S]*?)<\/script>/);
  const script = m[1];
  function extract(name) {
    const re = new RegExp('function ' + name + '\\([\\s\\S]*?\\n\\}');
    const mm = script.match(re);
    if (!mm) throw new Error('함수 추출 실패: ' + name);
    return mm[0];
  }
  // 워치독 + 의존 함수. showThinking/hideThinking은 thinking-badge DOM을 실제로 만든다.
  const names = ['_hasSpinningTool', 'markProgress', 'startProgressWatch',
                 'stopProgressWatch', 'showThinking', 'hideThinking', '_thinkPhase'];
  let src = '';
  for (const n of names) { try { src += extract(n) + '\n'; } catch (e) { /* _thinkPhase 등 선택 */ } }
  // 모듈 스코프 변수들 (chat.html 상단 선언) — 추출 함수가 참조.
  src = 'var _progressWatch = { bub: null, lastAt: 0, timer: null };\n'
      + 'var _PROGRESS_IDLE_MS = 900;\n'
      + 'var streaming = false;\n'
      + 'function scrollBottom(){}\n'
      + 'function _thinkPhase(){ return "생각 중"; }\n'
      + src
      + '\nwindow._fns = { _hasSpinningTool, markProgress, startProgressWatch, stopProgressWatch, showThinking, hideThinking, setStreaming(v){ streaming = v; }, getProgressWatch(){ return _progressWatch; } };';
  (0, eval)(src);
}

function mkBubble() {
  const b = document.createElement('div');
  b.className = 'bubble';
  document.getElementById('stage').appendChild(b);
  return b;
}
function mkToolBadge(bub, { spinning }) {
  const wrap = document.createElement('div'); wrap.className = 'tool-item';
  const badge = document.createElement('div'); badge.className = 'tool-badge' + (spinning ? '' : ' done');
  if (spinning) { const s = document.createElement('span'); s.className = 'spin-icon'; s.textContent = '⟳'; badge.appendChild(s); }
  wrap.appendChild(badge); bub.appendChild(wrap);
  return badge;
}
const hasThinking = (bub) => !!bub.querySelector('.thinking-badge');
const sleep = (ms) => new Promise(r => setTimeout(r, ms));

async function run() {
  await loadFns();
  const F = window._fns;
  const results = [];

  // ── 케이스 1: 도구 끝나고 답변 시작 전 갭 ──
  // 도구 배지가 done 상태 → 토큰 안 옴 → idle 초과 시 thinking 자동 복원.
  {
    F.setStreaming(true);
    const bub = mkBubble();
    mkToolBadge(bub, { spinning: false });   // 완료된 도구
    F.startProgressWatch(bub);
    const before = hasThinking(bub);          // idle 전: 아직 없음
    await sleep(1200);                         // _PROGRESS_IDLE_MS(900) 초과
    const after = hasThinking(bub);            // idle 후: thinking 복원돼야 함
    F.stopProgressWatch(); F.setStreaming(false);
    results.push({ case: '도구갭', before_false: before === false, after_true: after === true, pass: before === false && after === true });
  }

  // ── 케이스 2: 도구 실행 중(회전 배지 있음)엔 thinking을 띄우지 않음 ──
  {
    F.setStreaming(true);
    const bub = mkBubble();
    mkToolBadge(bub, { spinning: true });     // 실행 중 도구
    F.startProgressWatch(bub);
    await sleep(1200);
    const noThinking = !hasThinking(bub);      // 도구 spin이 표시 역할 → thinking 없어야 함
    F.stopProgressWatch(); F.setStreaming(false);
    results.push({ case: '도구실행중', pass: noThinking });
  }

  // ── 케이스 3: 토큰 끊김 — markProgress로 리셋되다가 멈추면 복원 ──
  {
    F.setStreaming(true);
    const bub = mkBubble();
    F.startProgressWatch(bub);
    // 600ms마다 토큰처럼 markProgress (idle 미달) → thinking 안 뜸
    F.markProgress(); await sleep(600);
    F.markProgress(); await sleep(600);
    const stillNone = !hasThinking(bub);       // 계속 리셋됐으니 없음
    // 이제 토큰 끊김 — 1200ms 방치
    await sleep(1200);
    const restored = hasThinking(bub);         // 복원됨
    F.stopProgressWatch(); F.setStreaming(false);
    results.push({ case: '토큰끊김', still_none: stillNone, restored, pass: stillNone && restored });
  }

  // ── 케이스 4: streaming 종료 후엔 워치독이 thinking을 만들지 않음 ──
  {
    F.setStreaming(true);
    const bub = mkBubble();
    F.startProgressWatch(bub);
    F.setStreaming(false);                      // 종료
    F.stopProgressWatch();
    await sleep(1200);
    const none = !hasThinking(bub);
    results.push({ case: '종료후무생성', pass: none });
  }

  // ── 케이스 5: 승인 대기 중엔 thinking 안 띄움 ──
  {
    F.setStreaming(true);
    window._awaitingApproval = true;
    const bub = mkBubble();
    F.startProgressWatch(bub);
    await sleep(1200);
    const none = !hasThinking(bub);
    window._awaitingApproval = false;
    F.stopProgressWatch(); F.setStreaming(false);
    results.push({ case: '승인대기', pass: none });
  }

  const out = { ok: results.every(r => r.pass), results };
  window.__RESULT__ = out;
  const sink = document.createElement('pre');
  sink.id = 'result-sink';
  sink.textContent = 'RESULT_JSON:' + JSON.stringify(out);
  document.body.appendChild(sink);
  document.title = 'DONE';
}
run().catch(e => {
  const out = { ok: false, error: String(e && e.stack || e) };
  const sink = document.createElement('pre');
  sink.id = 'result-sink';
  sink.textContent = 'RESULT_JSON:' + JSON.stringify(out);
  document.body.appendChild(sink);
  document.title = 'DONE';
});
</script>
</body></html>
