<!doctype html>
<!-- Created: 2026-06-06
     Purpose: chat.html permission 모드 드롭다운(_applyPermMode/cyclePermissionMode/setPermissionMode)
              + research 토글을 실제 DOM + fetch mock으로 검증. Claude Code 스타일 순환.
     Usage: Chrome --headless --dump-dom → #result-sink 의 RESULT_JSON. -->
<html><head><meta charset="utf-8"></head><body>
<!-- permission UI 골격 (chat.html 구조 모방) -->
<div id="perm-mode-wrap">
  <button id="perm-mode-btn" data-perm="default">
    <span id="perm-mode-icon">⏵</span><span id="perm-mode-label">Default</span><span class="perm-caret">▾</span>
  </button>
  <div id="perm-mode-menu" class="hidden">
    <button class="perm-opt" data-perm="default"><span class="perm-opt-check">✓</span></button>
    <button class="perm-opt" data-perm="plan"><span class="perm-opt-check">✓</span></button>
    <button class="perm-opt" data-perm="bypass"><span class="perm-opt-check">✓</span></button>
  </div>
</div>
<span id="planModeBadge" style="display:none"></span>
<span id="yoloModeBadge" style="display:none"></span>
<button class="mode-chip" data-mode="research"></button>
<span id="researchModeBadge" style="display:none"></span>
<script>
async function loadFns() {
  const html = await fetch('../../web/static/chat.html').then(r => r.text());
  const m = html.match(/<script(?![^>]*\bsrc=)[^>]*>([\s\S]*?)<\/script>/);
  const script = m[1];
  function extract(name) {
    const re = new RegExp('(?:async )?function ' + name + '\\([\\s\\S]*?\\n\\}');
    const mm = script.match(re);
    if (!mm) throw new Error('함수 추출 실패: ' + name);
    return mm[0];
  }
  const constBlock = script.match(/const _PERM_META = \{[\s\S]*?let _permMode = 'default';/)[0];
  let src = '';
  src += 'var currentSid = "sid-1";\n';
  src += 'var headerSid = { textContent: "" };\n';
  src += 'function refreshSessions(){}\n';
  src += 'async function ensureSession(){ return "sid-1"; }\n';
  src += constBlock + '\n';
  for (const n of ['_applyPermMode', 'refreshPermissionMode', 'setPermissionMode',
                   'cyclePermissionMode', 'updateResearchModeIndicator', 'toggleResearchMode']) {
    src += extract(n) + '\n';
  }
  src += 'window._fns = { _applyPermMode, setPermissionMode, cyclePermissionMode, toggleResearchMode, getPermMode: () => _permMode };';
  (0, eval)(src);
}

let _lastPost = null;
let _serverPerm = 'default';
let _serverResearch = false;
function installFetchMock() {
  window.fetch = async (url, opts) => {
    if (opts && opts.method === 'POST' && url.includes('permission-mode')) {
      const b = JSON.parse(opts.body || '{}');
      _lastPost = { url, body: b };
      if (b.cycle) {
        const order = ['default', 'plan', 'bypass'];
        _serverPerm = order[(order.indexOf(_serverPerm) + 1) % 3];
      } else { _serverPerm = b.mode; }
      return { json: async () => ({ permission_mode: _serverPerm }) };
    }
    if (opts && opts.method === 'POST' && url.includes('research-mode')) {
      const b = JSON.parse(opts.body || '{}');
      _serverResearch = ('enabled' in b) ? b.enabled : !_serverResearch;
      return { json: async () => ({ research_mode: _serverResearch }) };
    }
    return { json: async () => ({}) };
  };
}

const btn = () => document.getElementById('perm-mode-btn');
const rchip = () => document.querySelector('.mode-chip[data-mode="research"]');
const sleep = (ms) => new Promise(r => setTimeout(r, ms));

async function run() {
  await loadFns();
  installFetchMock();
  const F = window._fns;
  const results = [];

  // 1) cycle: default → plan
  await F.cyclePermissionMode(); await sleep(10);
  results.push({ case: 'cycle→plan',
    pass: F.getPermMode() === 'plan' && btn().dataset.perm === 'plan'
          && document.getElementById('planModeBadge').style.display === 'inline-block' });

  // 2) cycle: plan → bypass
  await F.cyclePermissionMode(); await sleep(10);
  results.push({ case: 'cycle→bypass',
    pass: F.getPermMode() === 'bypass'
          && document.getElementById('yoloModeBadge').style.display === 'inline-block'
          && document.getElementById('planModeBadge').style.display === 'none' });

  // 3) cycle: bypass → default
  await F.cyclePermissionMode(); await sleep(10);
  results.push({ case: 'cycle→default',
    pass: F.getPermMode() === 'default'
          && document.getElementById('yoloModeBadge').style.display === 'none' });

  // 4) setPermissionMode 직접 지정
  await F.setPermissionMode('bypass'); await sleep(10);
  results.push({ case: 'set bypass', pass: F.getPermMode() === 'bypass' && _lastPost.body.mode === 'bypass' });

  // 5) research 토글 — permission과 독립
  await F.toggleResearchMode(); await sleep(10);
  results.push({ case: 'research독립',
    pass: rchip().classList.contains('active') && F.getPermMode() === 'bypass' });  // bypass 유지

  // 6) 메뉴 선택 체크 표시
  await F.setPermissionMode('plan'); await sleep(10);
  const planOpt = document.querySelector('.perm-opt[data-perm="plan"]');
  results.push({ case: '메뉴체크', pass: planOpt.classList.contains('selected') });

  const out = { ok: results.every(r => r.pass), results };
  const sink = document.createElement('pre');
  sink.id = 'result-sink';
  sink.textContent = 'RESULT_JSON:' + JSON.stringify(out);
  document.body.appendChild(sink);
}
run().catch(e => {
  const sink = document.createElement('pre');
  sink.id = 'result-sink';
  sink.textContent = 'RESULT_JSON:' + JSON.stringify({ ok: false, error: String(e && e.stack || e) });
  document.body.appendChild(sink);
});
</script>
</body></html>
