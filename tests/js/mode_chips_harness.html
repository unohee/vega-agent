<!doctype html>
<!-- Created: 2026-06-06
     Purpose: chat.html 모드 칩 토글(toggleMode/_syncModeChip)을 실제 DOM + fetch mock
              위에서 검증. 칩 클릭 → 올바른 엔드포인트 POST → 서버 확정값으로 active 반영.
     Usage: Chrome --headless --dump-dom → #result-sink 의 RESULT_JSON. -->
<html><head><meta charset="utf-8"></head><body>
<div id="mode-chips">
  <button class="mode-chip" data-mode="plan">📋 Plan</button>
  <button class="mode-chip" data-mode="research">🔬 Research</button>
  <button class="mode-chip" data-mode="yolo">⚡ YOLO</button>
</div>
<script>
async function loadFns() {
  const html = await fetch('../../web/static/chat.html').then(r => r.text());
  const m = html.match(/<script(?![^>]*\bsrc=)[^>]*>([\s\S]*?)<\/script>/);
  const script = m[1];
  function extract(name) {
    const re = new RegExp('(?:async )?function ' + name + '\\([\\s\\S]*?\\n\\}');
    const mm = script.match(re);
    if (!mm) throw new Error('함수 추출 실패: ' + name);
    return mm[0];
  }
  // 모드 칩 상수 블록(_MODE_EP/_MODE_KEY/_MODE_INDICATOR) + 함수들을 추출.
  const constBlock = script.match(/const _MODE_EP = \{[\s\S]*?const _MODE_INDICATOR = \{[\s\S]*?\};/)[0];
  let src = '';
  src += 'var currentSid = "sid-1";\n';
  src += 'var headerSid = { textContent: "" };\n';
  src += 'function refreshSessions(){}\n';
  // 인디케이터: 헤더 배지 없이 칩만 동기화하도록 단순화(_syncModeChip 사용).
  src += extract('_syncModeChip') + '\n';
  src += 'function updatePlanModeIndicator(a){ _syncModeChip("plan", a); }\n';
  src += 'function updateResearchModeIndicator(a){ _syncModeChip("research", a); }\n';
  src += 'function updateYoloModeIndicator(a){ _syncModeChip("yolo", a); }\n';
  src += constBlock + '\n';
  src += extract('ensureSession') + '\n';
  src += extract('toggleMode') + '\n';
  src += 'window._fns = { toggleMode, _syncModeChip };';
  (0, eval)(src);
}

// fetch mock — 서버 토글을 흉내. 마지막 POST의 url/body를 기록.
// 주의: loadFns()가 끝난 뒤 설치해야 chat.html fetch(real)를 깨지 않는다.
let _lastPost = null;
const _serverState = { plan: false, research: false, yolo: false };
function installFetchMock() {
  window.fetch = async (url, opts) => {
    if (opts && opts.method === 'POST') {
      _lastPost = { url, body: JSON.parse(opts.body || '{}') };
      const mode = url.includes('plan-mode') ? 'plan'
                 : url.includes('research-mode') ? 'research'
                 : url.includes('yolo-mode') ? 'yolo' : null;
      const want = ('enabled' in _lastPost.body) ? _lastPost.body.enabled : !_serverState[mode];
      _serverState[mode] = want;
      const key = mode === 'plan' ? 'plan_mode' : mode === 'research' ? 'research_mode' : 'yolo_mode';
      return { json: async () => ({ [key]: want }) };
    }
    return { json: async () => ({}) };
  };
}

const chip = (m) => document.querySelector(`.mode-chip[data-mode="${m}"]`);
const sleep = (ms) => new Promise(r => setTimeout(r, ms));

async function run() {
  await loadFns();           // 진짜 fetch로 chat.html 로드
  installFetchMock();        // 그 다음 POST 토글을 가로채는 mock 설치
  const F = window._fns;
  const results = [];

  // 1) yolo 켜기: POST에 enabled:true, active 클래스 부여
  await F.toggleMode('yolo');
  await sleep(10);
  results.push({ case: 'yolo켜기',
    pass: _lastPost.url.includes('/yolo-mode') && _lastPost.body.enabled === true
          && chip('yolo').classList.contains('active') });

  // 2) yolo 끄기: POST에 enabled:false, active 제거
  await F.toggleMode('yolo');
  await sleep(10);
  results.push({ case: 'yolo끄기',
    pass: _lastPost.body.enabled === false && !chip('yolo').classList.contains('active') });

  // 3) research는 yolo와 독립 — research만 켜도 yolo active 안 켜짐
  await F.toggleMode('research');
  await sleep(10);
  results.push({ case: 'research독립',
    pass: _lastPost.url.includes('/research-mode') && chip('research').classList.contains('active')
          && !chip('yolo').classList.contains('active') });

  // 4) 올바른 엔드포인트 경로 매핑 (plan → plan-mode)
  await F.toggleMode('plan');
  await sleep(10);
  results.push({ case: 'plan경로',
    pass: _lastPost.url.includes('/plan-mode') && chip('plan').classList.contains('active') });

  const out = { ok: results.every(r => r.pass), results };
  const sink = document.createElement('pre');
  sink.id = 'result-sink';
  sink.textContent = 'RESULT_JSON:' + JSON.stringify(out);
  document.body.appendChild(sink);
  document.title = 'DONE';
}
run().catch(e => {
  const sink = document.createElement('pre');
  sink.id = 'result-sink';
  sink.textContent = 'RESULT_JSON:' + JSON.stringify({ ok: false, error: String(e && e.stack || e) });
  document.body.appendChild(sink);
  document.title = 'DONE';
});
</script>
</body></html>
