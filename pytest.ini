[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = strict
addopts = --tb=short -n auto --dist worksteal
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
markers =
    deepeval: LLM을 평가 모델로 호출하는 DeepEval 테스트 (시간/비용 발생, CI에서 -m "not deepeval"로 제외)

[coverage:run]
source =
    pipeline/tools_code
    pipeline/project_state
    pipeline/compaction
    pipeline/session_store
    pipeline/contact_store

[coverage:report]
fail_under = 70
